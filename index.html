<!DOCTYPE html>
<html>

<head>
  <title>Trainings-App</title>

  <style>
    body {
      font-family: Arial;
      margin: 0;
      padding: 0;
    }

    /* =========================
       📅 KALENDER BUTTON
    ========================== */
    #kalenderButton {
      position: fixed;
      top: 10px;
      right: 10px;
      font-size: 24px;
      cursor: pointer;
      z-index: 10;
    }

    /* =========================
       📆 KALENDER (Apple-like)
    ========================== */
    #kalender {
      display: none;
      height: 50vh;
      overflow-y: scroll;
      border-bottom: 2px solid #ccc;
      padding: 10px;
    }

    .monat {
      margin-bottom: 30px;
    }

    .monat h2 {
      text-align: center;
    }

    .wochentage {
      display: grid;
      grid-template-columns: repeat(7, 1fr);
      text-align: center;
      font-weight: bold;
      margin-bottom: 5px;
    }

    .tageGrid {
      display: grid;
      grid-template-columns: repeat(7, 1fr);
      gap: 5px;
    }

    .tag {
      height: 35px;
      display: flex;
      align-items: center;
      justify-content: center;
      border-radius: 8px;
      cursor: pointer;
      border: 1px solid #ddd;
    }

    .heute {
      border: 2px solid red;
    }

    .erledigt {
      background-color: lightgreen;
    }

    .verpasst {
      background-color: lightcoral;
    }

    /* =========================
       📊 ZEITSTRAHL
    ========================== */
    #zeitstrahl {
      margin-top: 70px;
      display: flex;
      flex-direction: column;
      align-items: center;
    }

    .zeitItem {
      width: 220px;
      padding: 10px;
      margin: 5px;
      text-align: center;
      border: 2px solid gray;
      border-radius: 10px;
    }

    .zeit-erledigt {
      border-color: green;
      background-color: #d4f8d4;
    }

    .zeit-verpasst {
      border-color: red;
      background-color: #ffd6d6;
    }

    .zeit-anstehend {
      border-color: gray;
      background-color: #eee;
    }

  </style>

</head>

<body>

  <!-- 📅 BUTTON -->
  <div id="kalenderButton" onclick="toggleKalender()">📅</div>

  <!-- 📆 KALENDER -->
  <div id="kalender"></div>

  <!-- 📊 ZEITSTRAHL -->
  <div id="zeitstrahl"></div>

  <script>

    /* =========================
       💾 SPEICHER (Browser)
       trainingstage = erledigte Tage
    ========================== */
    let trainingstage = JSON.parse(localStorage.getItem("tage")) || [];

    const kalender = document.getElementById("kalender");
    const zeitstrahl = document.getElementById("zeitstrahl");

    const heute = new Date();
    const heuteString = heute.toDateString();

    /* =========================
       📅 KALENDER ÖFFNEN
    ========================== */
    function toggleKalender() {
      const k = document.getElementById("kalender");

      if (k.style.display === "none") {
        k.style.display = "block";

        // springt automatisch zum aktuellen Monat
        setTimeout(() => {
          document.getElementById("aktuellerMonat").scrollIntoView({
            behavior: "smooth",
            block: "center"
          });
        }, 100);
      } else {
        k.style.display = "none";
      }
    }

    /* =========================
       📆 KALENDER ERSTELLEN
       (2026–2030)
    ========================== */
    const wochentage = ["Mo","Di","Mi","Do","Fr","Sa","So"];

    for (let jahr = 2026; jahr <= 2030; jahr++) {

      for (let monat = 0; monat < 12; monat++) {

        let monatDiv = document.createElement("div");
        monatDiv.classList.add("monat");

        let titel = document.createElement("h2");

        let datum = new Date(jahr, monat);

        titel.innerText = datum.toLocaleString("de-DE", {
          month: "long",
          year: "numeric"
        });

        monatDiv.appendChild(titel);

        /* 📌 aktueller Monat markieren */
        if (
          jahr === heute.getFullYear() &&
          monat === heute.getMonth()
        ) {
          monatDiv.id = "aktuellerMonat";
        }

        /* 📅 Wochentage */
        let woche = document.createElement("div");
        woche.classList.add("wochentage");

        wochentage.forEach(d => {
          let el = document.createElement("div");
          el.innerText = d;
          woche.appendChild(el);
        });

        monatDiv.appendChild(woche);

        /* 📆 Tage Grid */
        let grid = document.createElement("div");
        grid.classList.add("tageGrid");

        let erster = new Date(jahr, monat, 1).getDay();
        erster = erster === 0 ? 6 : erster - 1;

        for (let i = 0; i < erster; i++) {
          let leer = document.createElement("div");
          grid.appendChild(leer);
        }

        let tage = new Date(jahr, monat + 1, 0).getDate();

        for (let tag = 1; tag <= tage; tag++) {

          let d = document.createElement("div");
          d.classList.add("tag");
          d.innerText = tag;

          let datumObj = new Date(jahr, monat, tag);
          let key = datumObj.toDateString();

          /* 🔴 HEUTE */
          if (key === heuteString) {
            d.classList.add("heute");
          }

          /* 🟢 erledigt */
          if (trainingstage.includes(key)) {
            d.classList.add("erledigt");
          }

          /* 🔴 verpasst */
          if (datumObj < heute && !trainingstage.includes(key)) {
            d.classList.add("verpasst");
          }

          /* 💾 speichern beim Klick */
          d.onclick = function () {
            if (!trainingstage.includes(key)) {
              trainingstage.push(key);
              localStorage.setItem("tage", JSON.stringify(trainingstage));
              location.reload();
            }
          };

          grid.appendChild(d);
        }

        monatDiv.appendChild(grid);
        kalender.appendChild(monatDiv);
      }
    }

    /* =========================
       📊 ZEITSTRAHL (-7 bis +7)
    ========================== */
    for (let i = -7; i <= 7; i++) {

      let datum = new Date();
      datum.setDate(heute.getDate() + i);

      let key = datum.toDateString();

      let div = document.createElement("div");
      div.classList.add("zeitItem");

      div.innerText = datum.toLocaleDateString("de-DE", {
        weekday: "short",
        day: "2-digit",
        month: "short"
      });

      /* 🟢 erledigt */
      if (trainingstage.includes(key)) {
        div.classList.add("zeit-erledigt");
      }

      /* 🔴 vergangen ohne Training */
      else if (datum < heute) {
        div.classList.add("zeit-verpasst");
      }

      /* ⚪ Zukunft */
      else {
        div.classList.add("zeit-anstehend");
      }

      /* 💾 Klick = speichern */
      div.onclick = function () {
        if (!trainingstage.includes(key)) {
          trainingstage.push(key);
          localStorage.setItem("tage", JSON.stringify(trainingstage));
          location.reload();
        }
      };

      zeitstrahl.appendChild(div);
    }

  </script>

</body>

</html>
