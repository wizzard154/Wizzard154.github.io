<!DOCTYPE html>
<html lang="de">
<head>
<meta charset="UTF-8">
<title>Maltes Trainingsplan</title>

<style>
body { font-family: Arial; margin: 0; }
h1 { text-align: center; }

#zeitstrahl {
  display: flex;
  gap: 12px;
  overflow-x: auto;
  padding: 20px;
}

.zeitItem {
  min-width: 120px;
  height: 170px;
  border-radius: 14px;
  border: 2px solid gray;
  padding: 10px;
  display: flex;
  flex-direction: column;
  justify-content: space-between;
  text-align: center;
  cursor: pointer;
}

.done { background: #d4f8d4; border-color: green; }
.missed { background: #ffd6d6; border-color: red; }
.future { background: #eee; }

/* =======================
   📊 PROGRESS BAR
======================= */
.progressContainer {
  width: 100%;
  height: 10px;
  background: #ddd;
  border-radius: 10px;
  overflow: hidden;
  margin-bottom: 10px;
}

.progressBar {
  height: 100%;
  width: 0%;
  background: #4CAF50;
  transition: width 0.3s;
}

/* =======================
   POPUPS
======================= */
#jogOverlay, #workoutOverlay, #overlay {
  position: fixed;
  top: 0;
  left: 0;
  width: 100%;
  height: 100%;
}

#overlay {
  background: rgba(0,0,0,0.5);
  display: none;
  justify-content: center;
  align-items: center;
}

#jogOverlay, #workoutOverlay {
  background: rgba(0,0,0,0.6);
  display: none;
  justify-content: center;
  align-items: center;
}

.popupBox {
  background: white;
  padding: 20px;
  border-radius: 15px;
  width: 80%;
  max-width: 320px;
  text-align: center;
}

/* Kalender */
#kalenderBox {
  background: white;
  width: 90%;
  max-width: 500px;
  height: 70%;
  overflow-y: scroll;
  border-radius: 15px;
  padding: 15px;
}

.monat { margin-bottom: 25px; }
.monat h3 { text-align: center; }

.wochentage {
  display: grid;
  grid-template-columns: repeat(7, 1fr);
  text-align: center;
  font-weight: bold;
}

.tageGrid {
  display: grid;
  grid-template-columns: repeat(7, 1fr);
  gap: 4px;
}

.tag {
  height: 40px;
  display: flex;
  justify-content: center;
  align-items: center;
  border-radius: 8px;
  pointer-events: none;
}

.heute { border: 2px solid red; }
.erledigt { background: #a8e6a3; }
.verpasst { background: #f5a3a3; }
.leer { background: transparent; }

button {
  margin-top: 15px;
  padding: 10px;
  border-radius: 10px;
  border: none;
  background: #4CAF50;
  color: white;
  font-size: 16px;
  cursor: pointer;
}

#kalenderButton {
  position: fixed;
  top: 10px;
  right: 10px;
  font-size: 24px;
  cursor: pointer;
}
</style>
</head>

<body>

<h1>Maltes Trainingsplan</h1>

<div id="zeitstrahl"></div>

<div id="kalenderButton" onclick="openKalender()">📅</div>

<!-- Kalender -->
<div id="overlay" onclick="closeKalender()">
  <div id="kalenderBox" onclick="event.stopPropagation()"></div>
</div>

<!-- Joggen -->
<div id="jogOverlay" onclick="closeJog()">
  <div class="popupBox" onclick="event.stopPropagation()">
    <h3>Joggen</h3>
    <p>Training beendet?</p>
    <button onclick="confirmJog()">Workout beenden</button>
  </div>
</div>

<!-- 🏋️ Calisthenics -->
<div id="workoutOverlay">
  <div class="popupBox">

    <!-- 📊 Fortschritt -->
    <div class="progressContainer">
      <div id="progressBar" class="progressBar"></div>
    </div>

    <h3 id="exerciseTitle"></h3>
    <p id="exerciseInfo"></p>
    <button id="workoutBtn" onclick="nextExercise()">Übung geschafft</button>
  </div>
</div>

<script>

/* =======================
   DATEN
======================= */
const STORAGE_KEY = "trainingData";
let trainingData = JSON.parse(localStorage.getItem(STORAGE_KEY)) || [];

let selectedDateKey = null;
let activeWorkout = null;

function save() {
  localStorage.setItem(STORAGE_KEY, JSON.stringify(trainingData));
}

function getEntry(key) {
  return trainingData.find(e => e.date === key);
}

/* =======================
   TRAININGSPLAN
======================= */
const calisthenicsPlan = [
  { name: "Klimmzüge", reps: "3x" },
  { name: "Klimmzüge", reps: "3x" },
  { name: "Klimmzüge", reps: "3x" },

  { name: "Dips", reps: "3x" },
  { name: "Dips", reps: "3x" },
  { name: "Dips", reps: "3x" },

  { name: "Rudern", reps: "7x" },
  { name: "Rudern", reps: "7x" },
  { name: "Rudern", reps: "7x" },

  { name: "Liegestütze", reps: "5x" },
  { name: "Liegestütze", reps: "5x" },
  { name: "Liegestütze", reps: "5x" },

  { name: "Hanging Leg-Raises", reps: "5x" },
  { name: "Hanging Leg-Raises", reps: "5x" },
  { name: "Hanging Leg-Raises", reps: "5x" }
];

/* =======================
   TRAININGSTYP
======================= */
function getTrainingType(date) {
  const d = date.getDay();
  if (d === 1 || d === 3 || d === 6) return "Calisthenics";
  if (d === 2 || d === 4 || d === 0) return "Joggen";
  if (d === 5) return "Tennis";
}

/* =======================
   ZEITSTRAHL
======================= */
function renderZeitstrahl() {

  const container = document.getElementById("zeitstrahl");
  container.innerHTML = "";
  const today = new Date();

  for (let i = -7; i <= 7; i++) {

    const d = new Date();
    d.setDate(today.getDate() + i);

    const key = d.toDateString();
    const entry = getEntry(key);

    const card = document.createElement("div");
    card.className = "zeitItem";

    let status = "";
    let cls = "";

    if (entry) { status = "✔️ erledigt"; cls = "done"; }
    else if (d < today) { status = "❌ verpasst"; cls = "missed"; }
    else { status = "⏳ offen"; cls = "future"; }

    card.classList.add(cls);

    const type = getTrainingType(d);

    card.innerHTML = `
      <div><b>${getLabel(i,d)}</b></div>
      <div>🏋️ ${type}</div>
      <div>${status}</div>
    `;

    card.onclick = () => handleClick(d, key, entry, type);
    container.appendChild(card);
  }
}

/* =======================
   KLICK
======================= */
function handleClick(date, key, entry, type) {

  const today = new Date();
  if (date > today) return;
  if (entry) return;

  selectedDateKey = key;

  if (type === "Joggen") {
    document.getElementById("jogOverlay").style.display = "flex";
  }
  else if (type === "Calisthenics") {
    activeWorkout = { index: 0, dateKey: key };
    openWorkout();
  }
  else {
    saveWorkout(key);
  }
}

/* =======================
   JOGGEN
======================= */
function confirmJog() {
  saveWorkout(selectedDateKey);
  closeJog();
}

function closeJog() {
  document.getElementById("jogOverlay").style.display = "none";
}

/* =======================
   🏋️ CALISTHENICS
======================= */
function openWorkout() {
  document.getElementById("workoutOverlay").style.display = "flex";
  showExercise();
}

function showExercise() {

  const ex = calisthenicsPlan[activeWorkout.index];

  document.getElementById("exerciseTitle").innerText = ex.name;
  document.getElementById("exerciseInfo").innerText = ex.reps;

  updateProgressBar();

  if (activeWorkout.index === calisthenicsPlan.length - 1) {
    document.getElementById("workoutBtn").innerText = "Workout beenden";
  } else {
    document.getElementById("workoutBtn").innerText = "Übung geschafft";
  }
}

/* =======================
   📊 PROGRESS UPDATE
======================= */
function updateProgressBar() {

  const total = calisthenicsPlan.length;
  const current = activeWorkout.index;

  const percent = (current / total) * 100;

  document.getElementById("progressBar").style.width = percent + "%";
}

/* =======================
   NEXT
======================= */
function nextExercise() {

  activeWorkout.index++;

  if (activeWorkout.index >= calisthenicsPlan.length) {
    saveWorkout(activeWorkout.dateKey);
    document.getElementById("workoutOverlay").style.display = "none";
  } else {
    showExercise();
  }
}

/* =======================
   SAVE
======================= */
function saveWorkout(key) {
  trainingData.push({ date: key });
  save();
  renderAll();
}

/* =======================
   KALENDER
======================= */
function openKalender() {
  document.getElementById("overlay").style.display = "flex";
  renderKalender();
}

function closeKalender() {
  document.getElementById("overlay").style.display = "none";
}

function renderKalender() {
  const box = document.getElementById("kalenderBox");
  box.innerHTML = "";

  const today = new Date();
  let todayEl = null;

  const weekdays = ["Mo","Di","Mi","Do","Fr","Sa","So"];

  for (let y = 2026; y <= 2030; y++) {
    for (let m = 0; m < 12; m++) {

      const month = document.createElement("div");
      month.className = "monat";

      const title = document.createElement("h3");
      title.innerText = new Date(y,m).toLocaleString("de-DE",{month:"long",year:"numeric"});

      const header = document.createElement("div");
      header.className = "wochentage";

      weekdays.forEach(d=>{
        const el=document.createElement("div");
        el.innerText=d;
        header.appendChild(el);
      });

      const grid = document.createElement("div");
      grid.className = "tageGrid";

      let first = new Date(y,m,1).getDay();
      first = first===0?6:first-1;

      for(let i=0;i<first;i++){
        const empty=document.createElement("div");
        empty.className="tag leer";
        grid.appendChild(empty);
      }

      const days = new Date(y,m+1,0).getDate();

      for(let d=1;d<=days;d++){
        const el=document.createElement("div");
        el.className="tag";
        el.innerText=d;

        const date=new Date(y,m,d);
        const key=date.toDateString();
        const entry=getEntry(key);

        if(key===today.toDateString()){ el.classList.add("heute"); todayEl=el; }
        if(entry) el.classList.add("erledigt");
        if(date<today && !entry) el.classList.add("verpasst");

        grid.appendChild(el);
      }

      month.appendChild(title);
      month.appendChild(header);
      month.appendChild(grid);
      box.appendChild(month);
    }
  }

  setTimeout(()=>{ if(todayEl) todayEl.scrollIntoView({block:"center"}); },100);
}

/* LABEL */
function getLabel(i,date){
  if(i===0) return "Heute";
  if(i===-1) return "Gestern";
  if(i===1) return "Morgen";

  return date.toLocaleDateString("de-DE",{weekday:"short",day:"2-digit",month:"short"});
}

/* START */
function renderAll(){
  renderZeitstrahl();
}
renderAll();

</script>

</body>
</html>
