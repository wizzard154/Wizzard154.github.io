<!DOCTYPE html>
<html lang="de">
<head>
<meta charset="UTF-8">
<title>Maltes Trainingsplan</title>

<style>
body { font-family: Arial; margin: 0; }
h1 { text-align: center; }

/* =======================
   📱 ZEITSTRAHL
======================= */
#zeitstrahl {
  display: flex;
  gap: 12px;
  overflow-x: auto;
  padding: 20px;
}

.zeitItem {
  min-width: 120px;
  height: 170px;
  border-radius: 14px;
  border: 2px solid gray;
  padding: 10px;
  display: flex;
  flex-direction: column;
  justify-content: space-between;
  text-align: center;
  cursor: pointer;
}

.done { background: #d4f8d4; border-color: green; }
.missed { background: #ffd6d6; border-color: red; }
.future { background: #eee; }

/* =======================
   📆 KALENDER
======================= */
#kalenderButton {
  position: fixed;
  top: 10px;
  right: 10px;
  font-size: 24px;
  cursor: pointer;
}

#kalender {
  display: none;
  height: 50vh;
  overflow-y: scroll;
  border-top: 2px solid #ccc;
  padding: 10px;
}

.tageGrid {
  display: grid;
  grid-template-columns: repeat(7, 1fr);
}

.tag {
  height: 35px;
  display: flex;
  justify-content: center;
  align-items: center;
  border: 1px solid #ddd;

  /* 👉 Kein Klick mehr möglich */
  pointer-events: none;
}

/* Farben */
.heute { border: 2px solid red; }
.erledigt { background: lightgreen; }
.verpasst { background: lightcoral; }

</style>
</head>

<body>

<h1>Maltes Trainingsplan</h1>

<div id="zeitstrahl"></div>

<div id="kalenderButton" onclick="toggleKalender()">📅</div>
<div id="kalender"></div>

<script>

/* =======================
   🧠 DATEN
======================= */
const STORAGE_KEY = "trainingData";
let trainingData = JSON.parse(localStorage.getItem(STORAGE_KEY)) || [];

function save() {
  localStorage.setItem(STORAGE_KEY, JSON.stringify(trainingData));
}

function getEntry(dateKey) {
  return trainingData.find(e => e.date === dateKey);
}

/* =======================
   📈 SCHWIERIGKEIT
======================= */
function getDifficulty() {
  const count = trainingData.length;
  if (count > 20) return 3;
  if (count > 10) return 2;
  return 1;
}

/* =======================
   🏋️ TRAINING (nur Zeitstrahl!)
======================= */
function toggleTraining(dateKey) {

  const entry = getEntry(dateKey);

  if (entry) {
    trainingData = trainingData.filter(e => e.date !== dateKey);
  } else {
    trainingData.push({
      date: dateKey,
      difficulty: getDifficulty()
    });
  }

  save();
  renderAll();
}

/* =======================
   📱 ZEITSTRAHL
======================= */
function renderZeitstrahl() {

  const container = document.getElementById("zeitstrahl");
  container.innerHTML = "";

  const today = new Date();

  for (let i = -7; i <= 7; i++) {

    const d = new Date();
    d.setDate(today.getDate() + i);

    const key = d.toDateString();
    const entry = getEntry(key);

    const card = document.createElement("div");
    card.className = "zeitItem";

    if (entry) card.classList.add("done");
    else if (d < today) card.classList.add("missed");
    else card.classList.add("future");

    card.innerHTML = `
      <div><b>${getLabel(i, d)}</b></div>
      <div>🏋️ Level ${entry ? entry.difficulty : "-"}</div>
      <div>${entry ? "✔️ erledigt" : "Training"}</div>
    `;

    // 👉 EINZIGE Stelle zum Eintragen!
    card.onclick = () => toggleTraining(key);

    container.appendChild(card);

    if (i === 0) {
      setTimeout(() => {
        card.scrollIntoView({ inline: "center" });
      }, 50);
    }
  }
}

/* =======================
   📆 KALENDER
======================= */
function renderKalender() {

  const kalender = document.getElementById("kalender");
  kalender.innerHTML = "";

  const today = new Date();
  let todayElement = null; // 👉 merken wo "heute" ist

  for (let y = 2026; y <= 2030; y++) {
    for (let m = 0; m < 12; m++) {

      const month = document.createElement("div");

      const title = document.createElement("h3");
      title.innerText = new Date(y, m).toLocaleString("de-DE", {
        month: "long",
        year: "numeric"
      });

      const grid = document.createElement("div");
      grid.className = "tageGrid";

      const days = new Date(y, m + 1, 0).getDate();

      for (let d = 1; d <= days; d++) {

        const el = document.createElement("div");
        el.className = "tag";
        el.innerText = d;

        const date = new Date(y, m, d);
        const key = date.toDateString();
        const entry = getEntry(key);

        if (key === today.toDateString()) {
          el.classList.add("heute");

          // 👉 HIER speichern wir das heutige Element
          todayElement = el;
        }

        if (entry) el.classList.add("erledigt");
        if (date < today && !entry) el.classList.add("verpasst");

        // ❌ KEIN onclick mehr!

        grid.appendChild(el);
      }

      month.appendChild(title);
      month.appendChild(grid);
      kalender.appendChild(month);
    }
  }

  // 👉 NACH DEM RENDERN: Scroll zu heute
  setTimeout(() => {
    if (todayElement) {
      todayElement.scrollIntoView({
        behavior: "auto",
        block: "center" // 👉 vertikal mittig
      });
    }
  }, 100);
}

/* =======================
   📅 BUTTON
======================= */
function toggleKalender() {

  const el = document.getElementById("kalender");

  if (el.style.display === "block") {
    el.style.display = "none";
  } else {
    el.style.display = "block";

    // 👉 WICHTIG: neu rendern beim Öffnen
    renderKalender();
  }
}

/* =======================
   🧠 LABELS
======================= */
function getLabel(i, date) {
  if (i === 0) return "Heute";
  if (i === -1) return "Gestern";
  if (i === 1) return "Morgen";

  return date.toLocaleDateString("de-DE", {
    weekday: "short",
    day: "2-digit",
    month: "short"
  });
}

/* =======================
   🔄 RENDER
======================= */
function renderAll() {
  renderZeitstrahl();
  renderKalender();
}

renderAll();

</script>

</body>
</html>
