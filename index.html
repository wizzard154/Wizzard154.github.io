<!DOCTYPE html>
<html lang="de">
<head>
<meta charset="UTF-8">
<title>Maltes Trainingsplan</title>

<style>
body { font-family: Arial; margin: 0; }
h1 { text-align: center; }

/* Zeitstrahl */
#zeitstrahl {
  display: flex;
  gap: 12px;
  overflow-x: auto;
  padding: 20px;
  scroll-behavior: smooth;
}

.zeitItem {
  min-width: 120px;
  height: 170px;
  border-radius: 14px;
  border: 2px solid gray;
  padding: 10px;
  display: flex;
  flex-direction: column;
  justify-content: space-between;
  text-align: center;
  cursor: pointer;
}

.done { background: #d4f8d4; border-color: green; }
.missed { background: #ffd6d6; border-color: red; }
.future { background: #eee; }

/* Buttons */
#planButton {
  display: block;
  margin: 10px auto;
  padding: 10px 20px;
  border-radius: 12px;
  background: #4CAF50;
  color: white;
  border: none;
}

#kalenderButton {
  position: fixed;
  top: 10px;
  right: 10px;
  font-size: 24px;
  cursor: pointer;
}

#resetButton {
  position: fixed;
  bottom: 20px;
  right: 20px;
  background: red;
  color: white;
  padding: 12px;
  border-radius: 12px;
}

/* Popup allgemein */
.overlay {
  position: fixed;
  top:0; left:0;
  width:100%; height:100%;
  background: rgba(0,0,0,0.6);
  display:none;
  justify-content:center;
  align-items:center;
}

.popupBox {
  background:white;
  padding:20px;
  border-radius:15px;
  width:80%;
  max-width:350px;
  text-align:center;
}

/* Progress */
.progressContainer {
  width:100%;
  height:10px;
  background:#ddd;
  border-radius:10px;
  overflow:hidden;
  margin-bottom:10px;
}

.progressBar {
  height:100%;
  width:0%;
  background:#4CAF50;
}

/* Kalender */
#kalenderBox {
  background:white;
  width:90%;
  max-width:500px;
  height:70%;
  overflow-y:scroll;
  border-radius:15px;
  padding:15px;
}

.wochentage, .tageGrid {
  display:grid;
  grid-template-columns:repeat(7,1fr);
}

.tag {
  height:40px;
  display:flex;
  justify-content:center;
  align-items:center;
  pointer-events:none;
}

.heute { border:2px solid red; }
.erledigt { background:#a8e6a3; }
.verpasst { background:#f5a3a3; }

/* Plan */
#planBox {
  background:white;
  width:90%;
  max-width:400px;
  max-height:80%;
  overflow-y:auto;
  border-radius:15px;
  padding:15px;
}

.planItem {
  display:flex;
  justify-content:space-between;
  margin-bottom:8px;
}
</style>
</head>

<body>

<h1>Maltes Trainingsplan</h1>

<div id="zeitstrahl"></div>

<button id="planButton" onclick="openPlan()">Trainingsplan</button>

<div id="kalenderButton" onclick="openKalender()">📅</div>
<button id="resetButton" onclick="resetData()">Reset</button>

<!-- Kalender -->
<div id="kalenderOverlay" class="overlay" onclick="closeKalender()">
  <div id="kalenderBox" onclick="event.stopPropagation()"></div>
</div>

<!-- Joggen -->
<div id="jogOverlay" class="overlay" onclick="closeJog()">
  <div class="popupBox" onclick="event.stopPropagation()">
    <h3>Joggen</h3>
    <p>Training beendet?</p>
    <button onclick="confirmJog()">Workout beenden</button>
  </div>
</div>

<!-- Tennis -->
<div id="tennisOverlay" class="overlay" onclick="closeTennis()">
  <div class="popupBox" onclick="event.stopPropagation()">
    <h3>Tennis</h3>
    <p>Training beendet?</p>
    <button onclick="confirmTennis()">Workout beenden</button>
  </div>
</div>

<!-- Workout -->
<div id="workoutOverlay" class="overlay">
  <div class="popupBox">
    <div class="progressContainer">
      <div id="progressBar" class="progressBar"></div>
    </div>
    <h3 id="exerciseTitle"></h3>
    <p id="exerciseInfo"></p>
    <button id="workoutBtn" onclick="nextExercise()">Weiter</button>
  </div>
</div>

<!-- Plan -->
<div id="planOverlay" class="overlay" onclick="closePlan()">
  <div id="planBox" onclick="event.stopPropagation()">
    <h3>Trainingsplan</h3>
    <div id="planList"></div>
    <button onclick="savePlan()">Speichern</button>
  </div>
</div>

<script>

const STORAGE_KEY="trainingData";
const PLAN_KEY="plan";

/* Daten */
let trainingData=JSON.parse(localStorage.getItem(STORAGE_KEY))||[];

let calisthenicsPlan=JSON.parse(localStorage.getItem(PLAN_KEY))||[
  {name:"Klimmzüge",reps:"3x"},
  {name:"Klimmzüge",reps:"3x"},
  {name:"Klimmzüge",reps:"3x"},
  {name:"Dips",reps:"3x"},
  {name:"Dips",reps:"3x"},
  {name:"Dips",reps:"3x"},
  {name:"Rudern",reps:"7x"},
  {name:"Rudern",reps:"7x"},
  {name:"Rudern",reps:"7x"},
  {name:"Liegestütze",reps:"5x"},
  {name:"Liegestütze",reps:"5x"},
  {name:"Liegestütze",reps:"5x"},
  {name:"Hanging Leg-Raises",reps:"5x"},
  {name:"Hanging Leg-Raises",reps:"5x"},
  {name:"Hanging Leg-Raises",reps:"5x"}
];

let selectedDateKey=null;
let activeWorkout=null;

function save(){localStorage.setItem(STORAGE_KEY,JSON.stringify(trainingData));}

/* Reset */
function resetData(){
  if(!confirm("Alles löschen?"))return;
  localStorage.clear();
  trainingData=[];
  renderAll();
}

/* Trainingstyp */
function getType(d){
  const day=d.getDay();
  if([1,3,6].includes(day))return "Calisthenics";
  if([2,4,0].includes(day))return "Joggen";
  return "Tennis";
}

/* Zeitstrahl */
function renderZeitstrahl(){
  const c=document.getElementById("zeitstrahl");
  c.innerHTML="";
  const today=new Date();
  let todayEl=null;

  for(let i=-7;i<=7;i++){
    const d=new Date();
    d.setDate(today.getDate()+i);
    const key=d.toDateString();
    const entry=trainingData.find(e=>e.date===key);

    const div=document.createElement("div");
    div.className="zeitItem";

    let status="",cls="";
    if(entry){status="✔️ erledigt";cls="done";}
    else if(d<today){status="❌ verpasst";cls="missed";}
    else{status="⏳ offen";cls="future";}

    div.classList.add(cls);

    const type=getType(d);

    div.innerHTML=`<div>${d.toLocaleDateString()}</div>
                   <div>${type}</div>
                   <div>${status}</div>`;

    div.onclick=()=>handleClick(d,key,entry,type);
    c.appendChild(div);

    if(i===0)todayEl=div;
  }

  setTimeout(()=>{if(todayEl)todayEl.scrollIntoView({inline:"center"});},100);
}

/* Klick */
function handleClick(d,key,entry,type){
  if(d>new Date()||entry)return;
  selectedDateKey=key;

  if(type==="Joggen")jogOverlay.style.display="flex";
  else if(type==="Tennis")tennisOverlay.style.display="flex";
  else{
    activeWorkout={index:0,dateKey:key};
    workoutOverlay.style.display="flex";
    showExercise();
  }
}

/* Joggen */
function confirmJog(){saveWorkout(selectedDateKey);closeJog();}
function closeJog(){jogOverlay.style.display="none";}

/* Tennis */
function confirmTennis(){saveWorkout(selectedDateKey);closeTennis();}
function closeTennis(){tennisOverlay.style.display="none";}

/* Workout */
function showExercise(){
  const ex=calisthenicsPlan[activeWorkout.index];
  exerciseTitle.innerText=ex.name;
  exerciseInfo.innerText=ex.reps;

  progressBar.style.width=(activeWorkout.index/calisthenicsPlan.length*100)+"%";

  if(activeWorkout.index===calisthenicsPlan.length-1)
    workoutBtn.innerText="Workout beenden";
}

function nextExercise(){
  activeWorkout.index++;
  if(activeWorkout.index>=calisthenicsPlan.length){
    saveWorkout(activeWorkout.dateKey);
    workoutOverlay.style.display="none";
  } else showExercise();
}

function saveWorkout(key){
  trainingData.push({date:key});
  save();
  renderAll();
}

/* Kalender */
function openKalender(){
  kalenderOverlay.style.display="flex";
  renderKalender();
}
function closeKalender(){kalenderOverlay.style.display="none";}

function renderKalender(){
  const box=document.getElementById("kalenderBox");
  box.innerHTML="";
  const today=new Date();

  for(let m=0;m<12;m++){
    const month=document.createElement("div");
    const grid=document.createElement("div");
    grid.className="tageGrid";

    const days=new Date(2026,m+1,0).getDate();

    for(let d=1;d<=days;d++){
      const el=document.createElement("div");
      el.className="tag";
      const date=new Date(2026,m,d);
      const key=date.toDateString();
      const entry=trainingData.find(e=>e.date===key);

      if(key===today.toDateString())el.classList.add("heute");
      if(entry)el.classList.add("erledigt");
      if(date<today&&!entry)el.classList.add("verpasst");

      el.innerText=d;
      grid.appendChild(el);
    }

    month.appendChild(grid);
    box.appendChild(month);
  }
}

/* Plan */
function openPlan(){planOverlay.style.display="flex";renderPlan();}
function closePlan(){planOverlay.style.display="none";}

function renderPlan(){
  const list=document.getElementById("planList");
  list.innerHTML="";

  calisthenicsPlan.forEach((ex,i)=>{
    const row=document.createElement("div");
    row.className="planItem";
    row.innerHTML=`<span>${ex.name}</span>
                   <input value="${ex.reps}" onchange="calisthenicsPlan[${i}].reps=this.value">`;
    list.appendChild(row);
  });
}

function savePlan(){
  localStorage.setItem(PLAN_KEY,JSON.stringify(calisthenicsPlan));
  closePlan();
}

function renderAll(){renderZeitstrahl();}

renderAll();

</script>

</body>
</html>
