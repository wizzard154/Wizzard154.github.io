<!DOCTYPE html>
<html lang="de">
<head>
<meta charset="UTF-8">
<title>Maltes Trainingsplan</title>

<style>
body { font-family: Arial; margin: 0; }
h1 { text-align: center; }

#zeitstrahl {
  display: flex;
  gap: 12px;
  overflow-x: auto;
  padding: 20px;
}

.zeitItem {
  min-width: 120px;
  height: 170px;
  border-radius: 14px;
  border: 2px solid gray;
  padding: 10px;
  display: flex;
  flex-direction: column;
  justify-content: space-between;
  text-align: center;
  cursor: pointer;
}

.done { background: #d4f8d4; border-color: green; }
.missed { background: #ffd6d6; border-color: red; }
.future { background: #eee; }

/* =======================
   🏋️ WORKOUT POPUP
======================= */
#workoutOverlay {
  position: fixed;
  top: 0;
  left: 0;
  width: 100%;
  height: 100%;
  background: rgba(0,0,0,0.6);
  display: none;
  justify-content: center;
  align-items: center;
}

#workoutBox {
  background: white;
  padding: 20px;
  border-radius: 15px;
  width: 85%;
  max-width: 320px;
  text-align: center;
}

button {
  margin-top: 15px;
  padding: 10px;
  border: none;
  border-radius: 10px;
  background: #4CAF50;
  color: white;
  font-size: 16px;
}

</style>
</head>

<body>

<h1>Maltes Trainingsplan</h1>

<div id="zeitstrahl"></div>

<!-- 🏋️ WORKOUT POPUP -->
<div id="workoutOverlay">
  <div id="workoutBox">
    <h3 id="exerciseTitle"></h3>
    <p id="exerciseInfo"></p>
    <button id="workoutBtn" onclick="nextExercise()">Übung geschafft</button>
  </div>
</div>

<script>

/* =======================
   🧠 DATEN
======================= */
const STORAGE_KEY = "trainingData";
let trainingData = JSON.parse(localStorage.getItem(STORAGE_KEY)) || [];

function save() {
  localStorage.setItem(STORAGE_KEY, JSON.stringify(trainingData));
}

function getEntry(dateKey) {
  return trainingData.find(e => e.date === dateKey);
}

/* =======================
   🏋️ CALISTHENICS PLAN
======================= */
const calisthenicsPlan = [
  { name: "Liegestütze", reps: 15 },
  { name: "Kniebeugen", reps: 20 },
  { name: "Plank", reps: "45 Sekunden" },
  { name: "Dips", reps: 10 }
];

/* =======================
   🧠 WORKOUT STATE
======================= */
let activeWorkout = null;

/* =======================
   🏋️ TRAINING TYPE
======================= */
function getTrainingType(date) {
  const day = date.getDay();

  if (day === 1 || day === 3 || day === 6) return "Calisthenics";
  if (day === 2 || day === 4 || day === 0) return "Joggen";
  if (day === 5) return "Tennis";
}

/* =======================
   📱 ZEITSTRAHL
======================= */
function renderZeitstrahl() {

  const container = document.getElementById("zeitstrahl");
  container.innerHTML = "";

  const today = new Date();

  for (let i = -7; i <= 7; i++) {

    const d = new Date();
    d.setDate(today.getDate() + i);

    const key = d.toDateString();
    const entry = getEntry(key);

    const card = document.createElement("div");
    card.className = "zeitItem";

    let statusText = "";
    let statusClass = "";

    if (entry) {
      statusText = "✔️ erledigt";
      statusClass = "done";
    }
    else if (d < today) {
      statusText = "❌ verpasst";
      statusClass = "missed";
    }
    else {
      statusText = "⏳ offen";
      statusClass = "future";
    }

    card.classList.add(statusClass);

    const type = getTrainingType(d);

    card.innerHTML = `
      <div><b>${getLabel(i, d)}</b></div>
      <div>🏋️ ${type}</div>
      <div>${statusText}</div>
    `;

    // 👉 Klick startet Workout
    card.onclick = () => startWorkout(d, key, entry, type);

    container.appendChild(card);
  }
}

/* =======================
   🏋️ WORKOUT START
======================= */
function startWorkout(date, key, entry, type) {

  const today = new Date();

  if (date > today) return;
  if (entry) return;

  // 👉 nur Calisthenics hat Plan
  if (type === "Calisthenics") {

    activeWorkout = {
      dateKey: key,
      index: 0
    };

    openWorkout();
  } else {
    // andere direkt speichern
    saveWorkout(key);
  }
}

/* =======================
   🏋️ WORKOUT UI
======================= */
function openWorkout() {
  document.getElementById("workoutOverlay").style.display = "flex";
  showExercise();
}

function closeWorkout() {
  document.getElementById("workoutOverlay").style.display = "none";
}

/* =======================
   🏋️ ÜBUNG ANZEIGEN
======================= */
function showExercise() {

  const ex = calisthenicsPlan[activeWorkout.index];

  document.getElementById("exerciseTitle").innerText =
    ex.name;

  document.getElementById("exerciseInfo").innerText =
    ex.reps;

  // letzter Schritt?
  if (activeWorkout.index === calisthenicsPlan.length - 1) {
    document.getElementById("workoutBtn").innerText = "Workout beenden";
  } else {
    document.getElementById("workoutBtn").innerText = "Übung geschafft";
  }
}

/* =======================
   🏋️ NÄCHSTE ÜBUNG
======================= */
function nextExercise() {

  activeWorkout.index++;

  if (activeWorkout.index >= calisthenicsPlan.length) {

    // 👉 WORKOUT FERTIG
    saveWorkout(activeWorkout.dateKey);
    closeWorkout();

  } else {
    showExercise();
  }
}

/* =======================
   💾 SPEICHERN
======================= */
function saveWorkout(key) {

  trainingData.push({
    date: key
  });

  save();
  renderZeitstrahl();
}

/* =======================
   🧠 LABEL
======================= */
function getLabel(i, date) {
  if (i === 0) return "Heute";
  if (i === -1) return "Gestern";
  if (i === 1) return "Morgen";

  return date.toLocaleDateString("de-DE", {
    weekday: "short",
    day: "2-digit",
    month: "short"
  });
}

/* =======================
   START
======================= */
renderZeitstrahl();

</script>

</body>
</html>
