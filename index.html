<!DOCTYPE html>
<html lang="de">
<head>
<meta charset="UTF-8">
<title>Maltes Trainingsplan</title>

<style>
body { font-family: Arial; margin: 0; }
h1 { text-align: center; }

/* =======================
   📱 ZEITSTRAHL
======================= */
#zeitstrahl {
  display: flex;
  gap: 12px;
  overflow-x: auto;
  padding: 20px;
}

.zeitItem {
  min-width: 120px;
  height: 170px;
  border-radius: 14px;
  border: 2px solid gray;
  padding: 10px;
  display: flex;
  flex-direction: column;
  justify-content: space-between;
  text-align: center;
  cursor: pointer;
}

.done { background: #d4f8d4; border-color: green; }
.missed { background: #ffd6d6; border-color: red; }
.future { background: #eee; }

/* =======================
   📆 POPUP OVERLAY
======================= */

/* 👉 DUNKLER HINTERGRUND */
#overlay {
  position: fixed;
  top: 0;
  left: 0;
  width: 100%;
  height: 100%;
  background: rgba(0,0,0,0.5);

  display: none; /* versteckt */
  justify-content: center;
  align-items: center;
}

/* 👉 KALENDER BOX */
#kalenderBox {
  background: white;
  width: 90%;
  max-width: 500px;
  height: 70%;
  overflow-y: scroll;
  border-radius: 15px;
  padding: 15px;
}

/* Button */
#kalenderButton {
  position: fixed;
  top: 10px;
  right: 10px;
  font-size: 24px;
  cursor: pointer;
}

/* Monatsdesign */
.monat { margin-bottom: 25px; }
.monat h3 { text-align: center; }

.wochentage {
  display: grid;
  grid-template-columns: repeat(7, 1fr);
  text-align: center;
  font-weight: bold;
}

.tageGrid {
  display: grid;
  grid-template-columns: repeat(7, 1fr);
  gap: 4px;
}

.tag {
  height: 40px;
  display: flex;
  justify-content: center;
  align-items: center;
  border-radius: 8px;
  pointer-events: none;
}

.heute { border: 2px solid red; }
.erledigt { background: #a8e6a3; }
.verpasst { background: #f5a3a3; }
.leer { background: transparent; }

</style>
</head>

<body>

<h1>Maltes Trainingsplan</h1>

<div id="zeitstrahl"></div>

<!-- 📅 Button -->
<div id="kalenderButton" onclick="openKalender()">📅</div>

<!-- 🌑 OVERLAY -->
<div id="overlay" onclick="closeKalender()">

  <!-- ❗ Stoppt Schließen wenn man im Kalender klickt -->
  <div id="kalenderBox" onclick="event.stopPropagation()"></div>

</div>

<script>

/* =======================
   🧠 DATEN
======================= */
const STORAGE_KEY = "trainingData";
let trainingData = JSON.parse(localStorage.getItem(STORAGE_KEY)) || [];

function save() {
  localStorage.setItem(STORAGE_KEY, JSON.stringify(trainingData));
}

function getEntry(dateKey) {
  return trainingData.find(e => e.date === dateKey);
}

/* =======================
   📈 LEVEL
======================= */
function getDifficulty() {
  const count = trainingData.length;
  if (count > 20) return 3;
  if (count > 10) return 2;
  return 1;
}

/* =======================
   🏋️ WOCHENPLAN
======================= */
function getTrainingType(date) {
  const day = date.getDay();

  if (day === 1 || day === 3 || day === 6) return "Calisthenics";
  if (day === 2 || day === 4 || day === 0) return "Joggen";
  if (day === 5) return "Tennis";
}

/* =======================
   🏋️ TOGGLE
======================= */
function toggleTraining(dateKey) {

  const entry = getEntry(dateKey);

  if (entry) {
    trainingData = trainingData.filter(e => e.date !== dateKey);
  } else {
    trainingData.push({
      date: dateKey,
      difficulty: getDifficulty()
    });
  }

  save();
  renderAll();
}

/* =======================
   📱 ZEITSTRAHL
======================= */
function renderZeitstrahl() {

  const container = document.getElementById("zeitstrahl");
  container.innerHTML = "";

  const today = new Date();

  for (let i = -7; i <= 7; i++) {

    const d = new Date();
    d.setDate(today.getDate() + i);

    const key = d.toDateString();
    const entry = getEntry(key);

    const card = document.createElement("div");
    card.className = "zeitItem";

    let statusText = "";
    let statusClass = "";

    if (entry) {
      statusText = "✔️ erledigt";
      statusClass = "done";
    }
    else if (d < today) {
      statusText = "❌ verpasst";
      statusClass = "missed";
    }
    else {
      statusText = "⏳ offen";
      statusClass = "future";
    }

    card.classList.add(statusClass);

    const trainingType = getTrainingType(d);

    card.innerHTML = `
      <div><b>${getLabel(i, d)}</b></div>
      <div>🏋️ ${trainingType}</div>
      <div>${statusText}</div>
    `;

    card.onclick = () => toggleTraining(key);

    container.appendChild(card);

    if (i === 0) {
      setTimeout(() => {
        card.scrollIntoView({ inline: "center" });
      }, 50);
    }
  }
}

/* =======================
   📆 POPUP KALENDER
======================= */
function renderKalender() {

  const kalender = document.getElementById("kalenderBox");
  kalender.innerHTML = "";

  const today = new Date();
  let todayElement = null;

  const weekdays = ["Mo","Di","Mi","Do","Fr","Sa","So"];

  for (let y = 2026; y <= 2030; y++) {
    for (let m = 0; m < 12; m++) {

      const month = document.createElement("div");
      month.className = "monat";

      const title = document.createElement("h3");
      title.innerText = new Date(y, m).toLocaleString("de-DE", {
        month: "long",
        year: "numeric"
      });

      const header = document.createElement("div");
      header.className = "wochentage";

      weekdays.forEach(day => {
        const el = document.createElement("div");
        el.innerText = day;
        header.appendChild(el);
      });

      const grid = document.createElement("div");
      grid.className = "tageGrid";

      let firstDay = new Date(y, m, 1).getDay();
      firstDay = firstDay === 0 ? 6 : firstDay - 1;

      for (let i = 0; i < firstDay; i++) {
        const empty = document.createElement("div");
        empty.className = "tag leer";
        grid.appendChild(empty);
      }

      const days = new Date(y, m + 1, 0).getDate();

      for (let d = 1; d <= days; d++) {

        const el = document.createElement("div");
        el.className = "tag";
        el.innerText = d;

        const date = new Date(y, m, d);
        const key = date.toDateString();
        const entry = getEntry(key);

        if (key === today.toDateString()) {
          el.classList.add("heute");
          todayElement = el;
        }

        if (entry) el.classList.add("erledigt");
        if (date < today && !entry) el.classList.add("verpasst");

        grid.appendChild(el);
      }

      month.appendChild(title);
      month.appendChild(header);
      month.appendChild(grid);
      kalender.appendChild(month);
    }
  }

  setTimeout(() => {
    if (todayElement) {
      todayElement.scrollIntoView({ block: "center" });
    }
  }, 100);
}

/* =======================
   📅 OPEN / CLOSE
======================= */

function openKalender() {
  document.getElementById("overlay").style.display = "flex";
  renderKalender();
}

function closeKalender() {
  document.getElementById("overlay").style.display = "none";
}

/* =======================
   🧠 LABELS
======================= */
function getLabel(i, date) {
  if (i === 0) return "Heute";
  if (i === -1) return "Gestern";
  if (i === 1) return "Morgen";

  return date.toLocaleDateString("de-DE", {
    weekday: "short",
    day: "2-digit",
    month: "short"
  });
}

/* =======================
   🔄 START
======================= */
function renderAll() {
  renderZeitstrahl();
}

renderAll();

</script>

</body>
</html>
