<!DOCTYPE html>
<html>

<head>
  <title>Trainings-App</title>

  <style>
    body {
      font-family: Arial;
      margin: 0;
      padding: 0;
    }

    /* =======================
       📅 BUTTON
    ======================= */
    #kalenderButton {
      position: fixed;
      top: 10px;
      right: 10px;
      font-size: 24px;
      cursor: pointer;
      z-index: 10;
    }

    /* =======================
       📆 KALENDER
    ======================= */
    #kalender {
      display: none;
      height: 50vh;
      overflow-y: scroll;
      border-bottom: 2px solid #ccc;
      padding: 10px;
    }

    .monat {
      margin-bottom: 30px;
    }

    .monat h2 {
      text-align: center;
    }

    .wochentage,
    .tageGrid {
      display: grid;
      grid-template-columns: repeat(7, 1fr);
    }

    .wochentage {
      font-weight: bold;
      text-align: center;
      margin-bottom: 5px;
    }

    .tag {
      height: 35px;
      display: flex;
      align-items: center;
      justify-content: center;
      border-radius: 8px;
      cursor: pointer;
      border: 1px solid #ddd;
    }

    .heute { border: 2px solid red; }
    .erledigt { background: lightgreen; }
    .verpasst { background: lightcoral; }

    /* =======================
       📱 ZEITSTRAHL
    ======================= */
    #zeitstrahl {
      display: flex;
      gap: 10px;
      overflow-x: auto;
      padding: 15px;
      margin-top: 70px;
      white-space: nowrap;
      scroll-behavior: smooth; /* 🔥 smooth scroll */
    }

    .zeitItem {
      min-width: 120px;
      flex: 0 0 auto;
      padding: 12px;
      text-align: center;
      border-radius: 12px;
      border: 2px solid gray;
      cursor: pointer;
    }

  </style>
</head>

<body>

  <!-- 📅 BUTTON -->
  <div id="kalenderButton" onclick="toggleKalender()">📅</div>

  <!-- 📆 KALENDER -->
  <div id="kalender"></div>

  <!-- 📱 ZEITSTRAHL -->
  <div id="zeitstrahl"></div>

  <script>

    /* =======================
       💾 SPEICHER
    ======================= */
    const STORAGE_KEY = "trainingstage";
    let trainingstage = JSON.parse(localStorage.getItem(STORAGE_KEY)) || [];

    const heute = new Date();
    const heuteKey = heute.toDateString();

    const kalender = document.getElementById("kalender");
    const zeitstrahl = document.getElementById("zeitstrahl");

    const wochentage = ["Mo","Di","Mi","Do","Fr","Sa","So"];

    function save() {
      localStorage.setItem(STORAGE_KEY, JSON.stringify(trainingstage));
    }

    /* =======================
       📅 KALENDER TOGGLE
    ======================= */
    function toggleKalender() {
      const k = document.getElementById("kalender");

      k.style.display = (k.style.display === "block") ? "none" : "block";

      if (k.style.display === "block") {
        setTimeout(() => {
          const el = document.getElementById("currentMonth");
          if (el) el.scrollIntoView({ behavior: "smooth", block: "center" });
        }, 100);
      }
    }

    /* =======================
       📆 KALENDER
    ======================= */
    function buildCalendar() {

      for (let y = 2026; y <= 2030; y++) {
        for (let m = 0; m < 12; m++) {

          const month = document.createElement("div");
          month.classList.add("monat");

          const title = document.createElement("h2");
          const d = new Date(y, m);

          title.innerText = d.toLocaleString("de-DE", {
            month: "long",
            year: "numeric"
          });

          month.appendChild(title);

          if (y === heute.getFullYear() && m === heute.getMonth()) {
            month.id = "currentMonth";
          }

          const w = document.createElement("div");
          w.classList.add("wochentage");

          wochentage.forEach(t => {
            const el = document.createElement("div");
            el.innerText = t;
            w.appendChild(el);
          });

          month.appendChild(w);

          const grid = document.createElement("div");
          grid.classList.add("tageGrid");

          let first = new Date(y, m, 1).getDay();
          first = first === 0 ? 6 : first - 1;

          for (let i = 0; i < first; i++) {
            grid.appendChild(document.createElement("div"));
          }

          const days = new Date(y, m + 1, 0).getDate();

          for (let day = 1; day <= days; day++) {

            const el = document.createElement("div");
            el.classList.add("tag");
            el.innerText = day;

            const key = new Date(y, m, day).toDateString();

            if (key === heuteKey) el.classList.add("heute");

            if (trainingstage.includes(key)) {
              el.classList.add("erledigt");
            }

            if (new Date(y, m, day) < heute && !trainingstage.includes(key)) {
              el.classList.add("verpasst");
            }

            el.onclick = () => {
              if (!trainingstage.includes(key)) {
                trainingstage.push(key);
                save();
                location.reload();
              }
            };

            grid.appendChild(el);
          }

          month.appendChild(grid);
          kalender.appendChild(month);
        }
      }
    }

    /* =======================
       📱 ZEITSTRAHL (-7 bis +7)
       + 🎯 ZENTRIERT AUF HEUTE
    ======================= */
    function buildTimeline() {

      let todayElement = null;

      for (let i = -7; i <= 7; i++) {

        const d = new Date();
        d.setDate(heute.getDate() + i);

        const key = d.toDateString();

        const el = document.createElement("div");
        el.classList.add("zeitItem");

        el.innerText = d.toLocaleDateString("de-DE", {
          weekday: "short",
          day: "2-digit",
          month: "short"
        });

        if (trainingstage.includes(key)) {
          el.style.borderColor = "green";
          el.style.background = "#d4f8d4";
        }
        else if (d < heute) {
          el.style.borderColor = "red";
          el.style.background = "#ffd6d6";
        }
        else {
          el.style.borderColor = "gray";
          el.style.background = "#eee";
        }

        if (i === 0) {
          todayElement = el;
        }

        el.onclick = () => {
          if (!trainingstage.includes(key)) {
            trainingstage.push(key);
            save();
            location.reload();
          }
        };

        zeitstrahl.appendChild(el);
      }

      /* 🎯 ZENTRIERUNG AUF HEUTE */
      setTimeout(() => {
        if (todayElement) {
          todayElement.scrollIntoView({
            behavior: "smooth",
            inline: "center",
            block: "nearest"
          });
        }
      }, 100);
    }

    /* =======================
       🚀 START
    ======================= */
    buildCalendar();
    buildTimeline();

  </script>

</body>

</html>
