<!DOCTYPE html>
<html lang="de">
<head>
<meta charset="UTF-8">
<title>Maltes Trainingsplan</title>

<style>
body { font-family: Arial; margin: 0; }
h1 { text-align: center; }

#zeitstrahl {
  display: flex;
  gap: 12px;
  overflow-x: auto;
  padding: 20px;
}

.zeitItem {
  min-width: 120px;
  height: 170px;
  border-radius: 14px;
  border: 2px solid gray;
  padding: 10px;
  display: flex;
  flex-direction: column;
  justify-content: space-between;
  text-align: center;
  cursor: pointer;
}

.done { border-color: green; background: #d4f8d4; }
.missed { border-color: red; background: #ffd6d6; }
.future { background: #eee; }

#kalenderButton {
  position: fixed;
  top: 10px;
  right: 10px;
  font-size: 24px;
  cursor: pointer;
}

#kalender {
  display: none;
  height: 50vh;
  overflow-y: scroll;
  border-top: 2px solid #ccc;
  padding: 10px;
}

.tageGrid {
  display: grid;
  grid-template-columns: repeat(7, 1fr);
}

.tag {
  height: 35px;
  display: flex;
  justify-content: center;
  align-items: center;
  border: 1px solid #ddd;
  cursor: pointer;
}

.heute { border: 2px solid red; }
.erledigt { background: lightgreen; }
.verpasst { background: lightcoral; }
</style>
</head>

<body>

<h1>Maltes Trainingsplan</h1>

<div id="zeitstrahl"></div>

<div id="kalenderButton" onclick="toggleKalender()">📅</div>
<div id="kalender"></div>

<script>

// =======================
// 🧠 DATENSTRUKTUR
// =======================
const STORAGE_KEY = "trainingData";

/*
Neue Struktur:
[
  {
    date: "Mon May 04 2026",
    difficulty: 1
  }
]
*/
let trainingData = JSON.parse(localStorage.getItem(STORAGE_KEY)) || [];

function save() {
  localStorage.setItem(STORAGE_KEY, JSON.stringify(trainingData));
}

function getEntry(dateKey) {
  return trainingData.find(e => e.date === dateKey);
}

// =======================
// 📈 PROGRESS SYSTEM
// =======================
function getDifficulty() {
  const doneCount = trainingData.length;

  if (doneCount > 20) return 3;
  if (doneCount > 10) return 2;
  return 1;
}

// =======================
// 🧠 TRAINING SPEICHERN
// =======================
function toggleTraining(dateKey) {

  const entry = getEntry(dateKey);

  if (entry) {
    // entfernen
    trainingData = trainingData.filter(e => e.date !== dateKey);
  } else {
    trainingData.push({
      date: dateKey,
      difficulty: getDifficulty()
    });
  }

  save();
  renderAll();
}

// =======================
// 📱 ZEITSTRAHL
// =======================
function renderZeitstrahl() {

  const container = document.getElementById("zeitstrahl");
  container.innerHTML = "";

  const today = new Date();

  for (let i = -7; i <= 7; i++) {

    const d = new Date();
    d.setDate(today.getDate() + i);

    const key = d.toDateString();
    const entry = getEntry(key);

    const card = document.createElement("div");
    card.className = "zeitItem";

    if (entry) card.classList.add("done");
    else if (d < today) card.classList.add("missed");
    else card.classList.add("future");

    card.innerHTML = `
      <div><b>${getLabel(i, d)}</b></div>
      <div>🏋️ Level ${entry ? entry.difficulty : "-"}</div>
      <div>${entry ? "✔️" : "Training"}</div>
    `;

    card.onclick = () => toggleTraining(key);

    container.appendChild(card);

    if (i === 0) {
      setTimeout(() => {
        card.scrollIntoView({ inline: "center" });
      }, 50);
    }
  }
}

// =======================
// 📆 KALENDER
// =======================
function renderKalender() {

  const kalender = document.getElementById("kalender");
  kalender.innerHTML = "";

  const today = new Date();

  for (let y = 2026; y <= 2030; y++) {
    for (let m = 0; m < 12; m++) {

      const month = document.createElement("div");

      const title = document.createElement("h3");
      title.innerText = new Date(y, m).toLocaleString("de-DE", {
        month: "long", year: "numeric"
      });

      const grid = document.createElement("div");
      grid.className = "tageGrid";

      const days = new Date(y, m + 1, 0).getDate();

      for (let d = 1; d <= days; d++) {

        const el = document.createElement("div");
        el.className = "tag";
        el.innerText = d;

        const date = new Date(y, m, d);
        const key = date.toDateString();
        const entry = getEntry(key);

        if (key === today.toDateString()) el.classList.add("heute");
        if (entry) el.classList.add("erledigt");
        if (date < today && !entry) el.classList.add("verpasst");

        el.onclick = () => toggleTraining(key);

        grid.appendChild(el);
      }

      month.appendChild(title);
      month.appendChild(grid);
      kalender.appendChild(month);
    }
  }
}

function toggleKalender() {
  const el = document.getElementById("kalender");
  el.style.display = el.style.display === "block" ? "none" : "block";
}

// =======================
// 🧠 LABELS
// =======================
function getLabel(i, date) {
  if (i === 0) return "Heute";
  if (i === -1) return "Gestern";
  if (i === 1) return "Morgen";

  return date.toLocaleDateString("de-DE", {
    weekday: "short",
    day: "2-digit",
    month: "short"
  });
}

// =======================
// 🔄 RENDER
// =======================
function renderAll() {
  renderZeitstrahl();
  renderKalender();
}

renderAll();

</script>

</body>
</html>
