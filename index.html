<!DOCTYPE html>
<html lang="de">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Maltes Trainingsplan</title>

  <style>
    body { font-family: Arial, sans-serif; margin: 0; padding: 0; }
    h1 { text-align: center; margin: 20px 0; }

    #zeitstrahl {
      display: flex;
      gap: 12px;
      overflow-x: auto;
      padding: 20px;
      scroll-behavior: smooth;
    }

    .zeitItem {
      min-width: 120px;
      height: 170px;
      border-radius: 14px;
      border: 2px solid gray;
      padding: 10px;
      display: flex;
      flex-direction: column;
      justify-content: space-between;
      text-align: center;
      cursor: pointer;
      flex-shrink: 0;
    }

    .done { background: #d4f8d4; border-color: green; }
    .missed { background: #ffd6d6; border-color: red; }
    .future { background: #eee; }

    #planButton {
      display: block;
      margin: 10px auto;
      padding: 10px 20px;
      border-radius: 12px;
      background: #4CAF50;
      color: white;
      border: none;
      cursor: pointer;
    }

    #kalenderButton {
      position: fixed;
      top: 10px;
      right: 10px;
      font-size: 28px;
      cursor: pointer;
      background: none;
      border: none;
    }

    #resetButton {
      position: fixed;
      bottom: 20px;
      right: 20px;
      background: #e74c3c;
      color: white;
      padding: 12px 16px;
      border-radius: 12px;
      border: none;
      cursor: pointer;
    }

    .overlay {
      position: fixed;
      top: 0; left: 0;
      width: 100%; height: 100%;
      background: rgba(0,0,0,0.6);
      display: none;
      justify-content: center;
      align-items: center;
      z-index: 1000;
    }

    .popupBox {
      background: white;
      padding: 20px;
      border-radius: 15px;
      width: 85%;
      max-width: 350px;
      text-align: center;
    }

    .progressContainer {
      width: 100%;
      height: 10px;
      background: #ddd;
      border-radius: 10px;
      overflow: hidden;
      margin-bottom: 15px;
    }

    .progressBar {
      height: 100%;
      width: 0%;
      background: #4CAF50;
      transition: width 0.3s ease;
    }

    #kalenderBox {
      background: white;
      width: 90%;
      max-width: 500px;
      max-height: 70vh;
      overflow-y: auto;
      border-radius: 15px;
      padding: 15px;
    }

    .monatsHeader { font-weight: bold; margin: 15px 0 5px; text-align: center; }

    .wochentage, .tageGrid {
      display: grid;
      grid-template-columns: repeat(7, 1fr);
      gap: 2px;
    }

    .wochentage span { text-align: center; font-size: 12px; color: #666; }

    .tag {
      height: 36px;
      display: flex;
      justify-content: center;
      align-items: center;
      border-radius: 6px;
      font-size: 14px;
    }

    .heute { border: 2px solid #e74c3c; }
    .erledigt { background: #a8e6a3; }
    .verpasst { background: #f5a3a3; }
    .leer { visibility: hidden; }

    #planBox {
      background: white;
      width: 90%;
      max-width: 400px;
      max-height: 80vh;
      overflow-y: auto;
      border-radius: 15px;
      padding: 15px;
    }

    .planItem {
      display: flex;
      justify-content: space-between;
      margin-bottom: 8px;
    }

    button {
      margin-top: 10px;
      padding: 10px;
      border-radius: 10px;
      border: none;
      cursor: pointer;
      background: #4CAF50;
      color: white;
    }

    .cancelBtn {
      background: #ccc;
      color: black;
    }
  </style>
</head>

<body>

<h1>Maltes Trainingsplan</h1>

<div id="zeitstrahl"></div>

<button id="planButton" onclick="openPlan()">Trainingsplan</button>
<button id="kalenderButton" onclick="openKalender()">📅</button>
<button id="resetButton" onclick="resetData()">Reset</button>

<!-- Kalender -->
<div id="kalenderOverlay" class="overlay" onclick="closeKalender()">
  <div id="kalenderBox" onclick="event.stopPropagation()"></div>
</div>

<!-- Joggen -->
<div id="jogOverlay" class="overlay" onclick="closeJog()">
  <div class="popupBox" onclick="event.stopPropagation()">
    <h3>🏃 Joggen</h3>
    <p>Training beendet?</p>
    <button onclick="confirmJog()">Workout beenden</button>
    <button class="cancelBtn" onclick="closeJog()">Abbrechen</button>
  </div>
</div>

<!-- Tennis -->
<div id="tennisOverlay" class="overlay" onclick="closeTennis()">
  <div class="popupBox" onclick="event.stopPropagation()">
    <h3>🎾 Tennis</h3>
    <p>Training beendet?</p>
    <button onclick="confirmTennis()">Workout beenden</button>
    <button class="cancelBtn" onclick="closeTennis()">Abbrechen</button>
  </div>
</div>

<!-- Workout -->
<div id="workoutOverlay" class="overlay">
  <div class="popupBox">
    <div class="progressContainer">
      <div id="progressBar" class="progressBar"></div>
    </div>
    <h3 id="exerciseTitle"></h3>
    <p id="exerciseInfo"></p>
    <button id="workoutBtn" onclick="nextExercise()">Weiter</button>
    <button class="cancelBtn" onclick="cancelWorkout()">Workout abbrechen</button>
  </div>
</div>

<!-- Plan -->
<div id="planOverlay" class="overlay" onclick="closePlan()">
  <div id="planBox" onclick="event.stopPropagation()">
    <h3>Trainingsplan bearbeiten</h3>
    <div id="planList"></div>
    <button onclick="savePlan()">Speichern</button>
  </div>
</div>

<script>
const STORAGE_KEY = "trainingData";
const PLAN_KEY = "plan";

let trainingData = JSON.parse(localStorage.getItem(STORAGE_KEY)) || [];

let calisthenicsPlan = JSON.parse(localStorage.getItem(PLAN_KEY)) || [
  { name: "Klimmzüge", reps: "3x" },
  { name: "Dips", reps: "3x" }
];

let selectedDateKey = null;
let activeWorkout = null;

function save() {
  localStorage.setItem(STORAGE_KEY, JSON.stringify(trainingData));
}

function resetData() {
  if (!confirm("Alle Daten löschen?")) return;
  localStorage.clear();
  trainingData = [];
  renderAll();
}

function getType(date) {
  const d = date.getDay();
  if ([1,3,6].includes(d)) return "Calisthenics";
  if ([2,4,0].includes(d)) return "Joggen";
  return "Tennis";
}

function isSameDay(d1,d2){return d1.toDateString()===d2.toDateString();}
function isPast(date){
  const t=new Date();t.setHours(0,0,0,0);
  const d=new Date(date);d.setHours(0,0,0,0);
  return d<t;
}

function renderZeitstrahl(){
  const c=document.getElementById("zeitstrahl");
  c.innerHTML="";
  const today=new Date();
  let todayEl=null;

  for(let i=-7;i<=7;i++){
    const d=new Date();
    d.setDate(today.getDate()+i);
    const key=d.toDateString();
    const entry=trainingData.find(e=>e.date===key);
    const type=getType(d);

    const div=document.createElement("div");
    div.className="zeitItem";

    let status,cls;
    if(entry){status="✔️ erledigt";cls="done";}
    else if(isPast(d)){status="❌ verpasst";cls="missed";}
    else{status="⏳ offen";cls="future";}

    div.classList.add(cls);

    div.innerHTML=`
      <div>${d.toLocaleDateString("de-DE",{weekday:"short"})}</div>
      <div>${d.toLocaleDateString()}</div>
      <div>${type}</div>
      <div>${status}</div>
    `;

    div.onclick=()=>handleClick(d,key,entry,type);
    c.appendChild(div);

    if(i===0)todayEl=div;
  }

  setTimeout(()=>{if(todayEl)todayEl.scrollIntoView({inline:"center"});},100);
}

function handleClick(d,key,entry,type){
  if(!isPast(d)&&!isSameDay(d,new Date()))return;
  if(entry)return;

  selectedDateKey=key;

  if(type==="Joggen")jogOverlay.style.display="flex";
  else if(type==="Tennis")tennisOverlay.style.display="flex";
  else{
    activeWorkout={index:0,dateKey:key};
    workoutOverlay.style.display="flex";
    showExercise();
  }
}

function confirmJog(){saveWorkout(selectedDateKey);closeJog();}
function closeJog(){jogOverlay.style.display="none";}

function confirmTennis(){saveWorkout(selectedDateKey);closeTennis();}
function closeTennis(){tennisOverlay.style.display="none";}

function cancelWorkout(){
  if(!confirm("Workout abbrechen?"))return;
  activeWorkout=null;
  workoutOverlay.style.display="none";
}

function showExercise(){
  const ex=calisthenicsPlan[activeWorkout.index];
  exerciseTitle.innerText=ex.name;
  exerciseInfo.innerText=ex.reps;
  progressBar.style.width=(activeWorkout.index/calisthenicsPlan.length*100)+"%";
}

function nextExercise(){
  activeWorkout.index++;
  if(activeWorkout.index>=calisthenicsPlan.length){
    saveWorkout(activeWorkout.dateKey);
    workoutOverlay.style.display="none";
  } else showExercise();
}

function saveWorkout(key){
  trainingData.push({date:key});
  save();
  renderAll();
}

function openPlan(){planOverlay.style.display="flex";renderPlan();}
function closePlan(){planOverlay.style.display="none";}

function renderPlan(){
  const list=document.getElementById("planList");
  list.innerHTML="";
  calisthenicsPlan.forEach((ex,i)=>{
    const row=document.createElement("div");
    row.className="planItem";
    row.innerHTML=`<span>${ex.name}</span>
    <input value="${ex.reps}" onchange="calisthenicsPlan[${i}].reps=this.value">`;
    list.appendChild(row);
  });
}

function savePlan(){
  localStorage.setItem(PLAN_KEY,JSON.stringify(calisthenicsPlan));
  closePlan();
}

function openKalender(){kalenderOverlay.style.display="flex";}
function closeKalender(){kalenderOverlay.style.display="none";}

function renderAll(){renderZeitstrahl();}
renderAll();
</script>

</body>
</html>
