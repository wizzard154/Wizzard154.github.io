<!DOCTYPE html>
<html lang="de">
<head>
<meta charset="UTF-8">
<title>Maltes Trainingsplan</title>

<style>
body { font-family: Arial; margin: 0; }
h1 { text-align: center; }

/* =======================
   📱 ZEITSTRAHL
======================= */
#zeitstrahl {
  display: flex;
  gap: 12px;
  overflow-x: auto;
  padding: 20px;
}

.zeitItem {
  min-width: 120px;
  height: 170px;
  border-radius: 14px;
  border: 2px solid gray;
  padding: 10px;
  display: flex;
  flex-direction: column;
  justify-content: space-between;
  text-align: center;
  cursor: pointer;
}

.done { background: #d4f8d4; border-color: green; }
.missed { background: #ffd6d6; border-color: red; }
.future { background: #eee; }

/* =======================
   📆 OVERLAY (Kalender)
======================= */
#overlay {
  position: fixed;
  top: 0;
  left: 0;
  width: 100%;
  height: 100%;
  background: rgba(0,0,0,0.5);
  display: none;
  justify-content: center;
  align-items: center;
}

#kalenderBox {
  background: white;
  width: 90%;
  max-width: 500px;
  height: 70%;
  overflow-y: scroll;
  border-radius: 15px;
  padding: 15px;
}

/* =======================
   🏋️ TRAINING POPUP
======================= */
#trainingOverlay {
  position: fixed;
  top: 0;
  left: 0;
  width: 100%;
  height: 100%;
  background: rgba(0,0,0,0.6);
  display: none;
  justify-content: center;
  align-items: center;
}

#trainingBox {
  background: white;
  padding: 20px;
  border-radius: 15px;
  width: 80%;
  max-width: 300px;
  text-align: center;
}

button {
  margin-top: 15px;
  padding: 10px;
  border: none;
  border-radius: 10px;
  background: #4CAF50;
  color: white;
  font-size: 16px;
  cursor: pointer;
}

/* =======================
   📆 BUTTON
======================= */
#kalenderButton {
  position: fixed;
  top: 10px;
  right: 10px;
  font-size: 24px;
  cursor: pointer;
}

</style>
</head>

<body>

<h1>Maltes Trainingsplan</h1>

<div id="zeitstrahl"></div>

<div id="kalenderButton" onclick="openKalender()">📅</div>

<!-- Kalender -->
<div id="overlay" onclick="closeKalender()">
  <div id="kalenderBox" onclick="event.stopPropagation()"></div>
</div>

<!-- 🏋️ Training Popup -->
<div id="trainingOverlay" onclick="closeTrainingPopup()">
  <div id="trainingBox" onclick="event.stopPropagation()">
    <h3 id="trainingTitle"></h3>
    <p id="trainingText"></p>
    <button onclick="confirmTraining()">Workout beenden</button>
  </div>
</div>

<script>

/* =======================
   🧠 DATEN
======================= */
const STORAGE_KEY = "trainingData";
let trainingData = JSON.parse(localStorage.getItem(STORAGE_KEY)) || [];

let selectedDateKey = null;

function save() {
  localStorage.setItem(STORAGE_KEY, JSON.stringify(trainingData));
}

function getEntry(dateKey) {
  return trainingData.find(e => e.date === dateKey);
}

/* =======================
   🏋️ TRAININGSTYP
======================= */
function getTrainingType(date) {
  const day = date.getDay();

  if (day === 1 || day === 3 || day === 6) return "Calisthenics";
  if (day === 2 || day === 4 || day === 0) return "Joggen";
  if (day === 5) return "Tennis";
}

/* =======================
   📱 ZEITSTRAHL
======================= */
function renderZeitstrahl() {

  const container = document.getElementById("zeitstrahl");
  container.innerHTML = "";

  const today = new Date();

  for (let i = -7; i <= 7; i++) {

    const d = new Date();
    d.setDate(today.getDate() + i);

    const key = d.toDateString();
    const entry = getEntry(key);

    const card = document.createElement("div");
    card.className = "zeitItem";

    let statusText = "";
    let statusClass = "";

    if (entry) {
      statusText = "✔️ erledigt";
      statusClass = "done";
    }
    else if (d < today) {
      statusText = "❌ verpasst";
      statusClass = "missed";
    }
    else {
      statusText = "⏳ offen";
      statusClass = "future";
    }

    card.classList.add(statusClass);

    const trainingType = getTrainingType(d);

    card.innerHTML = `
      <div><b>${getLabel(i, d)}</b></div>
      <div>🏋️ ${trainingType}</div>
      <div>${statusText}</div>
    `;

    // 👉 NEUE LOGIK
    card.onclick = () => handleTrainingClick(d, key, entry);

    container.appendChild(card);

    if (i === 0) {
      setTimeout(() => {
        card.scrollIntoView({ inline: "center" });
      }, 50);
    }
  }
}

/* =======================
   🧠 KLICK LOGIK
======================= */
function handleTrainingClick(date, key, entry) {

  const today = new Date();

  // 👉 Zukunft blockieren
  if (date > today) return;

  // 👉 schon erledigt → nichts machen
  if (entry) return;

  const type = getTrainingType(date);

  selectedDateKey = key;

  // 👉 Nur Joggen Popup
  if (type === "Joggen") {
    openTrainingPopup("Joggen", "Training beendet?");
  } else {
    // andere direkt speichern
    saveTraining();
  }
}

/* =======================
   🏋️ POPUP
======================= */
function openTrainingPopup(title, text) {
  document.getElementById("trainingTitle").innerText = title;
  document.getElementById("trainingText").innerText = text;
  document.getElementById("trainingOverlay").style.display = "flex";
}

function closeTrainingPopup() {
  document.getElementById("trainingOverlay").style.display = "none";
}

function confirmTraining() {
  saveTraining();
  closeTrainingPopup();
}

/* =======================
   💾 SPEICHERN
======================= */
function saveTraining() {
  trainingData.push({ date: selectedDateKey });
  save();
  renderZeitstrahl();
}

/* =======================
   📆 KALENDER
======================= */
function openKalender() {
  document.getElementById("overlay").style.display = "flex";
}

function closeKalender() {
  document.getElementById("overlay").style.display = "none";
}

/* =======================
   🧠 LABELS
======================= */
function getLabel(i, date) {
  if (i === 0) return "Heute";
  if (i === -1) return "Gestern";
  if (i === 1) return "Morgen";

  return date.toLocaleDateString("de-DE", {
    weekday: "short",
    day: "2-digit",
    month: "short"
  });
}

/* =======================
   🔄 START
======================= */
renderZeitstrahl();

</script>

</body>
</html>
