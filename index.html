<!DOCTYPE html>
<html>

<head>
  <title>Maltes Trainingsplan</title>

  <style>
    body {
      font-family: Arial;
      margin: 0;
      padding: 0;
    }

    /* =======================
       🏷️ TITEL
    ======================= */
    h1 {
      text-align: center;
      margin-top: 20px;
    }

    /* =======================
       📱 ZEITSTRAHL (hochkant Cards)
    ======================= */
    #zeitstrahl {
      display: flex;
      gap: 12px;
      overflow-x: auto;
      padding: 20px;
      margin-top: 10px;
      scroll-behavior: smooth;
    }

    .zeitItem {
      min-width: 120px;
      height: 160px;
      flex: 0 0 auto;
      border-radius: 14px;
      border: 2px solid gray;
      padding: 10px;
      display: flex;
      flex-direction: column;
      justify-content: space-between;
      text-align: center;
    }

    .tagLabel {
      font-weight: bold;
      font-size: 14px;
    }

    .dateLabel {
      font-size: 12px;
      color: #555;
    }

    .trainingLabel {
      font-size: 12px;
      color: #999;
    }

    .done { border-color: green; background: #d4f8d4; }
    .missed { border-color: red; background: #ffd6d6; }
    .future { border-color: gray; background: #eee; }

    /* =======================
       📆 KALENDER BUTTON
    ======================= */
    #kalenderButton {
      position: fixed;
      top: 10px;
      right: 10px;
      font-size: 24px;
      cursor: pointer;
      z-index: 10;
    }

    /* =======================
       📆 KALENDER
    ======================= */
    #kalender {
      display: none;
      height: 50vh;
      overflow-y: scroll;
      border-top: 2px solid #ccc;
      border-bottom: 2px solid #ccc;
      padding: 10px;
    }

    .monat {
      margin-bottom: 30px;
    }

    .monat h2 {
      text-align: center;
    }

    .wochentage,
    .tageGrid {
      display: grid;
      grid-template-columns: repeat(7, 1fr);
    }

    .wochentage {
      font-weight: bold;
      text-align: center;
      margin-bottom: 5px;
    }

    .tag {
      height: 35px;
      display: flex;
      align-items: center;
      justify-content: center;
      border-radius: 8px;
      cursor: pointer;
      border: 1px solid #ddd;
    }

    .heute { border: 2px solid red; }
    .erledigt { background: lightgreen; }
    .verpasst { background: lightcoral; }

  </style>
</head>

<body>

  <!-- 🏷️ TITEL -->
  <h1>Maltes Trainingsplan</h1>

  <!-- 📱 ZEITSTRAHL -->
  <div id="zeitstrahl"></div>

  <!-- 📆 KALENDER BUTTON -->
  <div id="kalenderButton" onclick="toggleKalender()">📅</div>

  <!-- 📆 KALENDER -->
  <div id="kalender"></div>

  <script>

    // =======================
    // 💾 SPEICHER
    // =======================
    const STORAGE_KEY = "trainingstage";
    let trainingstage = JSON.parse(localStorage.getItem(STORAGE_KEY)) || [];

    const today = new Date();
    const todayKey = today.toDateString();

    const kalender = document.getElementById("kalender");
    const zeitstrahl = document.getElementById("zeitstrahl");

    function save() {
      localStorage.setItem(STORAGE_KEY, JSON.stringify(trainingstage));
    }

    // =======================
    // 📅 KALENDER TOGGLE
    // =======================
    function toggleKalender() {
      const k = document.getElementById("kalender");

      k.style.display = (k.style.display === "block") ? "none" : "block";

      if (k.style.display === "block") {
        setTimeout(() => {
          const el = document.getElementById("currentMonth");
          if (el) el.scrollIntoView({ behavior: "smooth", block: "center" });
        }, 100);
      }
    }

    // =======================
    // 📱 ZEITSTRAHL (-2 bis +2)
    // =======================
    let todayElement = null;

    function getLabel(i) {
      if (i === -2) return "Vorgestern";
      if (i === -1) return "Gestern";
      if (i === 0) return "Heute";
      if (i === 1) return "Morgen";
      if (i === 2) return "Übermorgen";
      return "";
    }

    for (let i = -2; i <= 2; i++) {

      const d = new Date();
      d.setDate(today.getDate() + i);

      const key = d.toDateString();

      const card = document.createElement("div");
      card.classList.add("zeitItem");

      if (trainingstage.includes(key)) {
        card.classList.add("done");
      }
      else if (d < today) {
        card.classList.add("missed");
      }
      else {
        card.classList.add("future");
      }

      const label = document.createElement("div");
      label.classList.add("tagLabel");
      label.innerText = getLabel(i);

      const date = document.createElement("div");
      date.classList.add("dateLabel");

      date.innerText = d.toLocaleDateString("de-DE", {
        weekday: "short",
        day: "2-digit",
        month: "short"
      });

      const training = document.createElement("div");
      training.classList.add("trainingLabel");
      training.innerText = "Training";

      card.appendChild(label);
      card.appendChild(date);
      card.appendChild(training);

      card.onclick = () => {
        if (!trainingstage.includes(key)) {
          trainingstage.push(key);
          save();
          location.reload();
        }
      };

      zeitstrahl.appendChild(card);

      if (i === 0) todayElement = card;
    }

    // 🎯 Zentrierung auf heute
    setTimeout(() => {
      if (todayElement) {
        todayElement.scrollIntoView({
          behavior: "smooth",
          inline: "center"
        });
      }
    }, 100);

    // =======================
    // 📆 KALENDER BAU
    // =======================
    function buildCalendar() {

      for (let y = 2026; y <= 2030; y++) {
        for (let m = 0; m < 12; m++) {

          const month = document.createElement("div");
          month.classList.add("monat");

          const title = document.createElement("h2");
          const d = new Date(y, m);

          title.innerText = d.toLocaleString("de-DE", {
            month: "long",
            year: "numeric"
          });

          month.appendChild(title);

          if (y === today.getFullYear() && m === today.getMonth()) {
            month.id = "currentMonth";
          }

          const w = document.createElement("div");
          w.classList.add("wochentage");

          ["Mo","Di","Mi","Do","Fr","Sa","So"].forEach(t => {
            const el = document.createElement("div");
            el.innerText = t;
            w.appendChild(el);
          });

          month.appendChild(w);

          const grid = document.createElement("div");
          grid.classList.add("tageGrid");

          let first = new Date(y, m, 1).getDay();
          first = first === 0 ? 6 : first - 1;

          for (let i = 0; i < first; i++) {
            grid.appendChild(document.createElement("div"));
          }

          const days = new Date(y, m + 1, 0).getDate();

          for (let day = 1; day <= days; day++) {

            const el = document.createElement("div");
            el.classList.add("tag");
            el.innerText = day;

            const key = new Date(y, m, day).toDateString();

            if (key === todayKey) el.classList.add("heute");

            if (trainingstage.includes(key)) {
              el.classList.add("erledigt");
            }

            if (new Date(y, m, day) < today && !trainingstage.includes(key)) {
              el.classList.add("verpasst");
            }

            el.onclick = () => {
              if (!trainingstage.includes(key)) {
                trainingstage.push(key);
                save();
                location.reload();
              }
            };

            grid.appendChild(el);
          }

          month.appendChild(grid);
          kalender.appendChild(month);
        }
      }
    }

    buildCalendar();

  </script>

</body>

</html>
