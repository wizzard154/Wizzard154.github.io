  import { initializeApp } from "https://www.gstatic.com/firebasejs/10.12.2/firebase-app.js";
  import { 
  getAuth,
  createUserWithEmailAndPassword,
  signInWithEmailAndPassword,
  signOut,
  onAuthStateChanged
} from "https://www.gstatic.com/firebasejs/10.12.2/firebase-auth.js";

import {
  getFirestore,
  doc,
  getDoc,
  setDoc
} from "https://www.gstatic.com/firebasejs/10.12.2/firebase-firestore.js";
            
  const firebaseConfig = {
  apiKey: "AIzaSyCwGK0DicEh01tTMm9HxuoKNjyAfUGDYYg",
  authDomain: "trainingsapp-ee8bf.firebaseapp.com",
  projectId: "trainingsapp-ee8bf",
  storageBucket: "trainingsapp-ee8bf.firebasestorage.app",
  messagingSenderId: "298756172721",
  appId: "1:298756172721:web:be38b51cac4f1037662b90"
};

  const app = initializeApp(firebaseConfig);
  const auth = getAuth(app);
const db = getFirestore(app);
window.db = db;
window.firebaseDB = { doc, getDoc, setDoc };

  // GLOBAL verfügbar machen
  window.auth = auth;
  window.firebaseAuth = {
    createUserWithEmailAndPassword,
    signInWithEmailAndPassword,
    signOut,
    onAuthStateChanged
  };
window.register = register;
window.login = login;
window.logout = logout;

onAuthStateChanged(auth, async (user) => {

  if (user) {
        await loadUserData();
    document.getElementById("loginBox").style.display = "none";
    document.getElementById("zeitstrahl").style.display = "flex";
    document.getElementById("resetButton").style.display = "block";
    document.getElementById("headerButtons").style.display = "flex";
  } else {
    document.getElementById("loginBox").style.display = "block";
    document.getElementById("zeitstrahl").style.display = "none";
    document.getElementById("resetButton").style.display = "none";
    document.getElementById("headerButtons").style.display = "none";
  }

  // 👉 jetzt UI freigeben
  document.body.style.visibility = "visible";

  renderAll();
});
            
</script>

  <script>
    // ===== KONSTANTEN =====
    const STORAGE_KEY = "trainingData";   // Key für erledigte Trainings
    const PLAN_KEY = "plan";              // Key für den Übungsplan
    const COUNT_KEY = "workoutCount";
    const progressionChains = {
  "Klimmzüge": [
    "Klimmzüge",
    "Pull-Ups",
    "High Pulls",
    "Muscle Ups"
  ],

  "Liegestütze": [
    "Liegestütze",
    "Ring Push-Ups",
    "Bulgarian Push-Ups",
    "One Arm Push-Ups"
  ],

  "Dips": [
  "Dips",
  "Straight Bar Dips",
  "Ring Dips",
  "Deep Ring Dips"
  ],  
      
  "Rudern": [
  "Rudern",
  "Feet Elevated Rows",
  "Bulgarisches Rudern",
  "Front Lever Rows (tuck)"
  ],
      
  "Hanging Leg-Raises": [
  "Hanging Leg-Raises",
  "Full Hanging Leg-Raises",
  "Dragonflag Negatives",
  "Dragonflag Pulls"
  ]
  
};

    // ===== DATEN LADEN =====
    // Lädt gespeicherte Trainingsdaten aus localStorage (oder leeres Array)
    let trainingData = JSON.parse(localStorage.getItem(STORAGE_KEY)) || [];

    // Standard-Calisthenics-Plan (wird aus localStorage geladen, falls vorhanden)
    let calisthenicsPlan = JSON.parse(localStorage.getItem(PLAN_KEY)) || [
      { name: "Klimmzüge", reps: "3x" },
      { name: "Klimmzüge", reps: "3x" },
      { name: "Klimmzüge", reps: "3x" },
      { name: "Dips", reps: "3x" },
      { name: "Dips", reps: "3x" },
      { name: "Dips", reps: "3x" },
      { name: "Rudern", reps: "7x" },
      { name: "Rudern", reps: "7x" },
      { name: "Rudern", reps: "7x" },
      { name: "Liegestütze", reps: "5x" },
      { name: "Liegestütze", reps: "5x" },
      { name: "Liegestütze", reps: "5x" },
      { name: "Hanging Leg-Raises", reps: "5x" },
      { name: "Hanging Leg-Raises", reps: "5x" },
      { name: "Hanging Leg-Raises", reps: "5x" }
    ];

    let workoutCount = parseInt(localStorage.getItem(COUNT_KEY)) || 0;

    // ===== ZUSTANDSVARIABLEN =====
    let selectedDateKey = null;   // Aktuell ausgewähltes Datum
    let activeWorkout = null;     // Aktueller Workout-Fortschritt

    // ===== HILFSFUNKTIONEN =====

    // Speichert Trainingsdaten in localStorage
    async function save() {
  const user = auth.currentUser;
  if (!user) return;

  await firebaseDB.setDoc(
    firebaseDB.doc(db, "users", user.uid),
    {
      trainingData: trainingData,
      plan: calisthenicsPlan
    },
    { merge: true }
  );
}

    // Bestimmt den Trainingstyp basierend auf dem Wochentag
    // Mo(1), Mi(3), Sa(6) = Calisthenics
    // Di(2), Do(4), So(0) = Joggen
    // Fr(5) = Tennis
    function getType(date) {
      const day = date.getDay();
      if ([1, 3, 6].includes(day)) return "Calisthenics";
      if ([2, 4, 0].includes(day)) return "Joggen";
      return "Tennis";
    }

    // Vergleicht zwei Daten (nur Jahr, Monat, Tag – ohne Uhrzeit)
    function isSameDay(d1, d2) {
      return d1.toDateString() === d2.toDateString();
    }

    // Prüft, ob ein Datum in der Vergangenheit liegt
    function isPast(date) {
      const today = new Date();
      today.setHours(0, 0, 0, 0);
      const compare = new Date(date);
      compare.setHours(0, 0, 0, 0);
      return compare < today;
    }

    // ===== RESET =====
    async function resetData() {
  if (!confirm("Alle Daten löschen?")) return;

  trainingData = [];
  
  // Standard-Plan wiederherstellen
  calisthenicsPlan = [
    { name: "Klimmzüge", reps: "3x" },
    { name: "Klimmzüge", reps: "3x" },
    { name: "Klimmzüge", reps: "3x" },
    { name: "Dips", reps: "3x" },
    { name: "Dips", reps: "3x" },
    { name: "Dips", reps: "3x" },
    { name: "Rudern", reps: "7x" },
    { name: "Rudern", reps: "7x" },
    { name: "Rudern", reps: "7x" },
    { name: "Liegestütze", reps: "5x" },
    { name: "Liegestütze", reps: "5x" },
    { name: "Liegestütze", reps: "5x" },
    { name: "Hanging Leg-Raises", reps: "5x" },
    { name: "Hanging Leg-Raises", reps: "5x" },
    { name: "Hanging Leg-Raises", reps: "5x" }
  ];

  await save();

  location.reload();
}

    // ===== ZEITSTRAHL RENDERN =====
    function renderZeitstrahl() {
      const container = document.getElementById("zeitstrahl");
      container.innerHTML = "";
      const today = new Date();
      let todayElement = null;

      // Zeigt 7 Tage zurück und 7 Tage voraus
      for (let i = -7; i <= 7; i++) {
        const date = new Date();
        date.setDate(today.getDate() + i);
        const key = date.toDateString();

        // Prüft, ob für dieses Datum ein Eintrag existiert
        const entry = trainingData.find(e => e.date === key);
        const type = getType(date);

        // Erstellt die Karte
        const div = document.createElement("div");
        div.className = "zeitItem";

        // Status bestimmen
        let status, statusClass;
        if (entry) {
          status = "✔️ erledigt";
          statusClass = "done";
        } else if (isPast(date)) {
          status = "❌ verpasst";
          statusClass = "missed";
        } else {
          status = "⏳ offen";
          statusClass = "future";
        }

        div.classList.add(statusClass);

        // Inhalt der Karte
        div.innerHTML = `
          <div><b>${getLabel(i,date)}</b></div>
          <div>${type}</div>
          <div>${status}</div>
        `;

        // Klick-Handler: Öffnet das passende Popup
        div.onclick = () => handleClick(date, key, entry, type);
        container.appendChild(div);

        // Merkt sich das heutige Element zum Zentrieren
        if (i === 0) todayElement = div;
      }

      // Scrollt zum heutigen Tag
      setTimeout(() => {
        if (todayElement) {
          todayElement.scrollIntoView({ inline: "center", behavior: "smooth" });
        }
      }, 100);
    }

    // ===== KLICK-HANDLER =====
    function handleClick(date, key, entry, type) {
      // Nur vergangene/heutige Tage ohne Eintrag können angeklickt werden
      if (!isPast(date) && !isSameDay(date, new Date())) return;
      if (entry) return;

      selectedDateKey = key;

      // Öffnet das passende Popup je nach Trainingstyp
      if (type === "Joggen") {
        document.getElementById("jogOverlay").style.display = "flex";
      } else if (type === "Tennis") {
        document.getElementById("tennisOverlay").style.display = "flex";
      } else {
        // Calisthenics: Startet das Workout
        activeWorkout = { index: 0, dateKey: key };
        document.getElementById("workoutOverlay").style.display = "flex";
        document.getElementById("workoutBtn").innerText = "Weiter";
        showExercise();
      }
    }

    function getLabel(i,date){
      if(i===-2) return "Vorgestern";
      if(i===-1) return "Gestern";
      if(i===0) return "Heute";
      if(i===1) return "Morgen";
      if(i===2) return "Übermorgen";
      return date.toLocaleDateString("de-DE",{weekday:"short" , day:"2-digit" , month:"short"});
    }

        async function loadUserData() {
  const user = auth.currentUser;
  if (!user) return;

  const snap = await firebaseDB.getDoc(
    firebaseDB.doc(db, "users", user.uid)
  );

  if (snap.exists()) {
    const data = snap.data();

    trainingData = data.trainingData || [];
    calisthenicsPlan = data.plan || calisthenicsPlan;
    if (!data.plan) await save();

    renderAll();
  }
}
        
    // ===== JOGGEN POPUP =====
    function confirmJog() {
      saveWorkout(selectedDateKey);
      closeJog();
    }

    function closeJog() {
      document.getElementById("jogOverlay").style.display = "none";
    }

    // ===== TENNIS POPUP =====
    function confirmTennis() {
      saveWorkout(selectedDateKey);
      closeTennis();
    }

    function closeTennis() {
      document.getElementById("tennisOverlay").style.display = "none";
    }

    // ===== WORKOUT (Calisthenics) =====
    function showExercise() {
      const exercise = calisthenicsPlan[activeWorkout.index];
      document.getElementById("exerciseTitle").innerText = exercise.name;
      document.getElementById("exerciseInfo").innerText = exercise.reps;

      // Aktualisiert den Fortschrittsbalken
      const progress = ((activeWorkout.index + 1) / calisthenicsPlan.length) * 100;
      document.getElementById("progressBar").style.width = progress + "%";

      // Ändert Button-Text bei letzter Übung
      if (activeWorkout.index === calisthenicsPlan.length - 1) {
        document.getElementById("workoutBtn").innerText = "Workout beenden";
      }
    }

    function nextExercise() {
      activeWorkout.index++;

      if (activeWorkout.index >= calisthenicsPlan.length) {
        // Workout abgeschlossen
        saveWorkout(activeWorkout.dateKey);
        document.getElementById("workoutOverlay").style.display = "none";
      } else {
        showExercise();
      }
    }

  function cancelWorkout() {
    if (!confirm("Workout wirklich abbrechen?")) return;

    activeWorkout = null;
    document.getElementById("workoutOverlay").style.display = "none";
  }
    
    // Speichert ein abgeschlossenes Training
  async function saveWorkout(key) {
      if (!trainingData.find(e => e.date === key)) {
  trainingData.push({ date: key });
}

        const date = new Date(key);
        const type = getType(date); 
      
      if (type === "Calisthenics") {
        workoutCount++;
        localStorage.setItem(COUNT_KEY, workoutCount);
        if (workoutCount % 6 === 0) { increaseIntensity();}
      }
      
      await save();
      renderAll();
    }

  function getNextExercise(name) {
    // Erst in vordefinierten Ketten suchen
    for (let key in progressionChains) {
      const chain = progressionChains[key];
      const index = chain.indexOf(name);

      if (index !== -1 && index < chain.length - 1) {
        return chain[index + 1];
      }
    }

    // Dann in benutzerdefinierten Progressionsketten suchen
    for (let i = 0; i < calisthenicsPlan.length; i++) {
      if (calisthenicsPlan[i].name === name && calisthenicsPlan[i].progressionChain && calisthenicsPlan[i].progressionChain.length > 0) {
        const chainIndex = calisthenicsPlan[i].progressionChain.indexOf(name);
        if (chainIndex !== -1 && chainIndex < calisthenicsPlan[i].progressionChain.length - 1) {
          return calisthenicsPlan[i].progressionChain[chainIndex + 1];
        }
      }
    }

    // Legacy-Support: alte "progression" einzelne Übung
    for (let i = 0; i < calisthenicsPlan.length; i++) {
      if (calisthenicsPlan[i].name === name && calisthenicsPlan[i].progression) {
        return calisthenicsPlan[i].progression;
      }
    }

    return null;
  }

 function increaseIntensity() {

  calisthenicsPlan.forEach(ex => {

    let reps = parseInt(ex.reps);

    if (isNaN(reps)) return;

    // 👉 1. Fall: unter 15 → einfach +1
    if (reps < 15) {
      reps++;
      ex.reps = reps + "x";
    }

    // 👉 2. Fall: bei 15 → Progression wechseln (nur für vorgegebene Ketten)
    else {
      const next = getNextExercise(ex.name);

      if (next) {
        ex.name = next;
        ex.reps = "3x";
      } else {
        // Keine Progression verfügbar → bleibt bei 15+
        // (auch für benutzerdefinierte Übungen)
        ex.reps = "15x";
      }
    }
  });

  localStorage.setItem(PLAN_KEY, JSON.stringify(calisthenicsPlan));

  alert("🔥 Progression aktualisiert!");
}

   function renderKalender() {
  const box = document.getElementById("kalenderBox");
  box.innerHTML = "";
  const today = new Date();
  const currentYear = today.getFullYear();

  let todayElement = null; // 👈 merken für Scroll

  const monatsnamen = [
    "Januar", "Februar", "März", "April", "Mai", "Juni",
    "Juli", "August", "September", "Oktober", "November", "Dezember"
  ];

  for (let m = 0; m < 12; m++) {
    // ===== Monatsüberschrift =====
    const header = document.createElement("div");
    header.className = "monatsHeader";
    header.innerText = monatsnamen[m] + " " + currentYear;
    box.appendChild(header);

    // ===== Wochentage =====
    const wochentage = document.createElement("div");
    wochentage.className = "wochentage";

    ["Mo", "Di", "Mi", "Do", "Fr", "Sa", "So"].forEach(tag => {
      const span = document.createElement("span");
      span.innerText = tag;
      wochentage.appendChild(span);
    });

    box.appendChild(wochentage);

    // ===== Grid =====
    const grid = document.createElement("div");
    grid.className = "tageGrid";

    const firstDay = new Date(currentYear, m, 1);
    let startDay = firstDay.getDay();
    startDay = (startDay === 0) ? 6 : startDay - 1;

    // Leere Felder am Anfang
    for (let i = 0; i < startDay; i++) {
      const empty = document.createElement("div");
      empty.className = "tag leer";
      grid.appendChild(empty);
    }

    const daysInMonth = new Date(currentYear, m + 1, 0).getDate();

    // ===== Tage =====
    for (let d = 1; d <= daysInMonth; d++) {
      const el = document.createElement("div");
      el.className = "tag";

      const date = new Date(currentYear, m, d);
      const key = date.toDateString();
      const entry = trainingData.find(e => e.date === key);

      // Markierungen
      if (isSameDay(date, today)) {
        el.classList.add("heute");
        todayElement = el; // 👈 speichern
      }

      if (entry) el.classList.add("erledigt");
      else if (isPast(date)) el.classList.add("verpasst");

      el.innerText = d;
      grid.appendChild(el);
    }

    box.appendChild(grid);
  }

  // ===== Scroll zum heutigen Tag =====
  setTimeout(() => {
    if (todayElement) {
      todayElement.scrollIntoView({
        behavior: "smooth",
        block: "center"
      });
    }
  }, 100);
}

    // ===== TRAININGSPLAN EDITOR =====
    function openPlan() {
      document.getElementById("planOverlay").style.display = "flex";
      renderPlan();
    }

    function closePlan() {
      document.getElementById("planOverlay").style.display = "none";

    function renderPlan() {
      const list = document.getElementById("planList");
      list.innerHTML = "";

      calisthenicsPlan.forEach((exercise, index) => {
        const row = document.createElement("div");
        row.className = "planItem";
        
        // Prüfe, ob diese Übung in einer vordefinierten Progressionskette ist
        const isInPredefinedChain = isExerciseInPredefinedChain(exercise.name);
        
        // Name-Input: read-only für vordefinierte, editierbar für benutzerdefinierte
        const nameInputDisabled = isInPredefinedChain ? "disabled" : "";
        const nameInputStyle = isInPredefinedChain ? "background-color: #f5f5f5; cursor: not-allowed;" : "";
        
        row.innerHTML = `
          <input type="text" value="${exercise.name}" oninput="updateName(${index}, this.value)" ${nameInputDisabled} style="${nameInputStyle}">
          <input type="number" min="1"
                  value="${exercise.reps.replace('x','')}" 
                  oninput="updateReps(${index}, this.value)">
          <button onclick="removeExercise(${index})" class="removeBtn">×</button>
        `;
        list.appendChild(row);

        // Progressions-Eingabefeld nur für Übungen, die nicht in vordefinierten Ketten sind
        if (!isInPredefinedChain) {
          const progressionRow = document.createElement("div");
          progressionRow.style.marginBottom = "12px";
          progressionRow.style.fontSize = "12px";
          progressionRow.style.color = "#666";
          
          const chainValue = exercise.progressionChain ? exercise.progressionChain.join(", ") : (exercise.progression || "");
          
          progressionRow.innerHTML = `
            <label>Progressionskette (komma-getrennt):</label><br>
            <input type="text" 
                   value="${chainValue}" 
                   placeholder="z.B. Übung 1, Übung 2, Übung 3" 
                   oninput="updateProgressionChain(${index}, this.value)"
                   style="width: 100%; padding: 6px; box-sizing: border-box; margin-top: 4px;">
            <p style="font-size: 11px; color: #999; margin-top: 4px;">Tipp: Geben Sie mehrere Stufen ein (komma-getrennt). Nach 15 Wiederholungen wird zur nächsten Stufe gewechselt.</p>
          `;
          list.appendChild(progressionRow);
        }
      });
    }

    function savePlan() {
      localStorage.setItem(PLAN_KEY, JSON.stringify(calisthenicsPlan));
      closePlan();
    }

    function updateReps(index, value) {
    let num = parseInt(value);

    if (isNaN(num) || num < 1) {
      num = 1; // fallback
    }
  
  calisthenicsPlan[index].reps = num + "x";
}

    function updateName(index, value) {
      calisthenicsPlan[index].name = value;
    }

    function updateProgression(index, value) {
      if (!calisthenicsPlan[index]) return;
      if (value.trim() === "") {
        calisthenicsPlan[index].progression = undefined;
      } else {
        calisthenicsPlan[index].progression = value.trim();
      }
    }

    function updateProgressionChain(index, value) {
      if (!calisthenicsPlan[index]) return;
      
      const trimmed = value.trim();
      if (trimmed === "") {
        // Leere Eingabe → lösche Progressionskette und alte Progression
        calisthenicsPlan[index].progressionChain = undefined;
        calisthenicsPlan[index].progression = undefined;
      } else {
        // Komma-getrennte Werte in Array umwandeln
        const chain = trimmed.split(",").map(item => item.trim()).filter(item => item !== "");
        calisthenicsPlan[index].progressionChain = chain;
        // Alte Progression entfernen, wenn neue Kette eingegeben wurde
        calisthenicsPlan[index].progression = undefined;
      }
    }

    function isExerciseInPredefinedChain(exerciseName) {
      for (let key in progressionChains) {
        if (progressionChains[key].includes(exerciseName)) {
          return true;
        }
      }
      return false;
    }

    function addExercise() {
      calisthenicsPlan.push({ name: "Neue Übung", reps: "3x" });
      renderPlan();
    }

    function removeExercise(index) {
      if (!confirm("Willst du diese Übung wirklich löschen?")) return;
      calisthenicsPlan.splice(index, 1);
      renderPlan();
    }

function getWeekKey(date) {
  const d = new Date(date);
  d.setHours(0,0,0,0);

  // ISO Woche (Montag Start)
  const day = d.getDay() || 7;
  d.setDate(d.getDate() + 4 - day);

  const yearStart = new Date(d.getFullYear(), 0, 1);
  const week = Math.ceil((((d - yearStart) / 86400000) + 1) / 7);

  return d.getFullYear() + "-W" + week;
}
    
    function isNextWeek(w1, w2) {
  const [y1, week1] = w1.split("-W").map(Number);
  const [y2, week2] = w2.split("-W").map(Number);

  if (y1 === y2 && week2 === week1 + 1) return true;

  // Jahreswechsel (z.B. Woche 52 → 1)
  if (y2 === y1 + 1 && week1 >= 52 && week2 === 1) return true;

  return false;
}

    function calculateStreak() {
  let weeks = {};

  trainingData.forEach(entry => {
    const key = getWeekKey(new Date(entry.date));
    if (!weeks[key]) weeks[key] = 0;
    weeks[key]++;
  });

  const validWeeks = Object.keys(weeks)
    .filter(k => weeks[k] >= 2)
    .sort();

  let bestStreak = 0;
  let currentStreak = 0;
  let temp = 0;

  for (let i = 0; i < validWeeks.length; i++) {
    if (i === 0) temp = 1;
    else if (isNextWeek(validWeeks[i - 1], validWeeks[i])) temp++;
    else temp = 1;

    if (temp > bestStreak) bestStreak = temp;
  }

  const today = new Date();
  const currentWeekKey = getWeekKey(today);
  const currentWeekCount = weeks[currentWeekKey] || 0;

  if (currentWeekCount >= 2) {
    currentStreak = 1;

    for (let i = validWeeks.length - 1; i > 0; i--) {
      if (isNextWeek(validWeeks[i - 1], validWeeks[i])) {
        currentStreak++;
      } else break;
    }
  }

  return {
    current: currentStreak,
    best: bestStreak
  };
}
  

 async function getBestStreak(weeks) {
  const validWeeks = Object.keys(weeks)
    .filter(k => weeks[k] >= 2)
    .sort();

  let best = 0;
  let current = 0;

  for (let i = 0; i < validWeeks.length; i++) {
    if (i === 0) {
      current = 1;
    } else if (isNextWeek(validWeeks[i - 1], validWeeks[i])) {
      current++;
    } else {
      current = 1;
    }

    if (current > best) best = current;
  }

  return best;
}
