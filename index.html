<!DOCTYPE html>
<html>

<head>
  <title>Übungs-App</title>

  <style>
    body {
      font-family: Arial;
    }

    /* 📅 Button oben rechts */
    #kalenderButton {
      position: absolute;
      top: 10px;
      right: 10px;
      font-size: 24px;
      cursor: pointer;
    }

    /* 📜 Scrollbarer Kalender */
    #kalender {
      display: none;
      height: 500px;
      overflow-y: scroll;
      border: 2px solid black;
      padding: 10px;
    }

    /* 📦 Monatscontainer */
    .monat {
      margin-bottom: 40px;
    }

    /* 📅 Monatsüberschrift */
    .monat h2 {
      text-align: center;
      margin-bottom: 10px;
    }

    /* 🗓️ Wochentage */
    .wochentage {
      display: grid;
      grid-template-columns: repeat(7, 1fr);
      text-align: center;
      font-weight: bold;
      margin-bottom: 5px;
    }

    /* 📆 Tage-Grid */
    .tageGrid {
      display: grid;
      grid-template-columns: repeat(7, 1fr);
      gap: 5px;
    }

    /* 📅 Einzelner Tag */
    .tag {
      height: 40px;
      display: flex;
      align-items: center;
      justify-content: center;
      border-radius: 8px;
      cursor: pointer;
    }

    .heute {
      border: 2px solid red;
    }

    .erledigt {
      background-color: lightgreen;
    }

    .verpasst {
      background-color: lightcoral;
    }

    .leer {
      /* Leere Felder (für Monatsanfang) */
    }
    
    #zeitstrahl {
  margin-top: 80px;
  display: flex;
  flex-direction: column;
  align-items: center;
}

.zeitItem {
  width: 200px;
  padding: 10px;
  margin: 5px;
  text-align: center;
  border: 2px solid gray;
  border-radius: 10px;
}

.erledigt {
  border-color: green;
  background-color: #d4f8d4;
}

.verpasst {
  border-color: red;
  background-color: #ffd6d6;
}

.anstehend {
  border-color: gray;
  background-color: #eeeeee;
}
    
  </style>

</head>

<body>

  <!-- 📅 Button -->
  <div id="kalenderButton" onclick="toggleKalender()">📅</div>

  <!-- 📆 Kalender -->
  <div id="kalender"></div>
  
  <div id="zeitstrahl"></div>

  <script>

    function toggleKalender() {
      const k = document.getElementById("kalender");

      if (k.style.display === "none") {
        k.style.display = "block";

        setTimeout(() => {
          document.getElementById("aktuellerMonat").scrollIntoView({
            behavior: "smooth",
            block: "center"
          });
        }, 100);

      } else {
        k.style.display = "none";
      }
    }

    const kalender = document.getElementById("kalender");

    const heute = new Date();
    const heuteString = heute.toDateString();

    let trainingstage = JSON.parse(localStorage.getItem("tage")) || [];

    const wochentageListe = ["Mo", "Di", "Mi", "Do", "Fr", "Sa", "So"];

    for (let jahr = 2026; jahr <= 2030; jahr++) {

      for (let monat = 0; monat < 12; monat++) {

        let monatDiv = document.createElement("div");
        monatDiv.classList.add("monat");

        let titel = document.createElement("h2");

        let datum = new Date(jahr, monat);

        titel.innerText = datum.toLocaleString("de-DE", {
          month: "long",
          year: "numeric"
        });

        monatDiv.appendChild(titel);

        // 🎯 aktueller Monat markieren
        if (
          jahr === heute.getFullYear() &&
          monat === heute.getMonth()
        ) {
          monatDiv.id = "aktuellerMonat";
        }

        // 📅 Wochentage anzeigen
        let wochentage = document.createElement("div");
        wochentage.classList.add("wochentage");

        wochentageListe.forEach(tag => {
          let wd = document.createElement("div");
          wd.innerText = tag;
          wochentage.appendChild(wd);
        });

        monatDiv.appendChild(wochentage);

        // 📆 Tage-Grid
        let tageGrid = document.createElement("div");
        tageGrid.classList.add("tageGrid");

        // Erster Tag des Monats
        let ersterTag = new Date(jahr, monat, 1).getDay();

        // Umrechnung: Sonntag (0) → 6
        ersterTag = ersterTag === 0 ? 6 : ersterTag - 1;

        // Leere Felder am Anfang
        for (let i = 0; i < ersterTag; i++) {
          let leer = document.createElement("div");
          leer.classList.add("leer");
          tageGrid.appendChild(leer);
        }

        let tageImMonat = new Date(jahr, monat + 1, 0).getDate();

        for (let tag = 1; tag <= tageImMonat; tag++) {

          let tagDiv = document.createElement("div");
          tagDiv.classList.add("tag");

          tagDiv.innerText = tag;

          let datumObj = new Date(jahr, monat, tag);
          let datumKey = datumObj.toDateString();

          if (datumKey === heuteString) {
            tagDiv.classList.add("heute");
          }

          if (trainingstage.includes(datumKey)) {
            tagDiv.classList.add("erledigt");
          }

          if (
            datumObj < heute &&
            !trainingstage.includes(datumKey)
          ) {
            tagDiv.classList.add("verpasst");
          }

          tagDiv.onclick = function () {
            trainingstage.push(datumKey);

            localStorage.setItem(
              "tage",
              JSON.stringify(trainingstage)
            );

            location.reload();
          };

          tageGrid.appendChild(tagDiv);
        }

        monatDiv.appendChild(tageGrid);
        kalender.appendChild(monatDiv);
      }
    }

    const zeitstrahl = document.getElementById("zeitstrahl");

// Heutiges Datum
const heute = new Date();

// Zeitraum: -7 bis +7 Tage
for (let i = -7; i <= 7; i++) {

  let datum = new Date();
  datum.setDate(heute.getDate() + i);

  let datumKey = datum.toDateString();

  let div = document.createElement("div");
  div.classList.add("zeitItem");

  // Datum anzeigen (z.B. 03. Mai)
  div.innerText = datum.toLocaleDateString("de-DE", {
    day: "2-digit",
    month: "short"
  });

  // STATUS bestimmen

  if (trainingstage.includes(datumKey)) {
    div.classList.add("erledigt"); // grün
  }

  else if (datum < heute) {
    div.classList.add("verpasst"); // rot
  }

  else {
    div.classList.add("anstehend"); // grau
  }

  // Klick = Training speichern
  div.onclick = function () {
    trainingstage.push(datumKey);

    localStorage.setItem(
      "tage",
      JSON.stringify(trainingstage)
    );

    location.reload();
  };

  zeitstrahl.appendChild(div);
}
    
  </script>

</body>

</html>
