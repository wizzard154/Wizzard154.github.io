<!DOCTYPE html>
<html>

<head>
  <title>Maltes Trainingsplan</title>

  <style>
    body {
      font-family: Arial;
      margin: 0;
      padding: 0;
    }

    h1 {
      text-align: center;
      margin-top: 20px;
    }

    /* =======================
       📱 ZEITSTRAHL
    ======================= */
    #zeitstrahl {
      display: flex;
      gap: 12px;
      overflow-x: auto;
      padding: 20px;
      scroll-behavior: smooth;
    }

    .zeitItem {
      min-width: 120px;
      height: 170px;
      flex: 0 0 auto;
      border-radius: 14px;
      border: 2px solid gray;
      padding: 10px;
      display: flex;
      flex-direction: column;
      justify-content: space-between;
      text-align: center;
    }

    .topLabel {
      font-weight: bold;
      font-size: 14px;
    }

    .imagePlaceholder {
      height: 70px;
      background: #ddd;
      border-radius: 10px;
    }

    .trainingLabel {
      font-size: 12px;
      color: #666;
    }

    .done { border-color: green; background: #d4f8d4; }
    .missed { border-color: red; background: #ffd6d6; }
    .future { border-color: gray; background: #eee; }

    /* =======================
       📆 KALENDER
    ======================= */
    #kalenderButton {
      position: fixed;
      top: 10px;
      right: 10px;
      font-size: 24px;
      cursor: pointer;
    }

    #kalender {
      display: none;
      height: 50vh;
      overflow-y: scroll;
      border-top: 2px solid #ccc;
      padding: 10px;
    }

    .monat { margin-bottom: 30px; }
    .monat h2 { text-align: center; }

    .tageGrid {
      display: grid;
      grid-template-columns: repeat(7, 1fr);
    }

    .tag {
      height: 35px;
      display: flex;
      justify-content: center;
      align-items: center;
      border-radius: 8px;
      border: 1px solid #ddd;
      cursor: pointer;
    }

    .heute { border: 2px solid red; }
    .erledigt { background: lightgreen; }
    .verpasst { background: lightcoral; }

  </style>
</head>

<body>

  <h1>Maltes Trainingsplan</h1>

  <div id="zeitstrahl"></div>

  <div id="kalenderButton" onclick="toggleKalender()">📅</div>
  <div id="kalender"></div>

  <script>

    const STORAGE_KEY = "trainingstage";
    let trainingstage = JSON.parse(localStorage.getItem(STORAGE_KEY)) || [];

    const today = new Date();
    const todayKey = today.toDateString();

    const zeitstrahl = document.getElementById("zeitstrahl");
    const kalender = document.getElementById("kalender");

    function save() {
      localStorage.setItem(STORAGE_KEY, JSON.stringify(trainingstage));
    }

    // =======================
    // 🧠 LABEL LOGIK
    // =======================
    function getLabel(i, date) {

      if (i === -2) return "Vorgestern";
      if (i === -1) return "Gestern";
      if (i === 0) return "Heute";
      if (i === 1) return "Morgen";
      if (i === 2) return "Übermorgen";

      // 👉 sonst: Datum anzeigen
      return date.toLocaleDateString("de-DE", {
        weekday:"short",
        day: "2-digit",
        month: "short"
      });
    }

    // =======================
    // 📱 ZEITSTRAHL (-7 bis +7)
    // =======================
    let todayElement = null;

    for (let i = -7; i <= 7; i++) {

      const d = new Date();
      d.setDate(today.getDate() + i);

      const key = d.toDateString();

      const card = document.createElement("div");
      card.classList.add("zeitItem");

      // Status
      if (trainingstage.includes(key)) {
        card.classList.add("done");
      }
      else if (d < today) {
        card.classList.add("missed");
      }
      else {
        card.classList.add("future");
      }

      // =======================
      // 🧱 1. ZEILE
      // =======================
      const top = document.createElement("div");
      top.classList.add("topLabel");
      top.innerText = getLabel(i, d);

      // =======================
      // 🖼️ 2. ZEILE (Bild Platzhalter)
      // =======================
      const img = document.createElement("div");
      img.classList.add("imagePlaceholder");

      // =======================
      // 🏋️ 3. ZEILE
      // =======================
      const training = document.createElement("div");
      training.classList.add("trainingLabel");
      training.innerText = "Training";

      card.appendChild(top);
      card.appendChild(img);
      card.appendChild(training);

      // Klick speichern
      card.onclick = () => {
        if (!trainingstage.includes(key)) {
          trainingstage.push(key);
          save();
          location.reload();
        }
      };

      zeitstrahl.appendChild(card);

      if (i === 0) todayElement = card;
    }

    // Zentrieren auf heute
    setTimeout(() => {
      if (todayElement) {
        todayElement.scrollIntoView({
          behavior: "auto",
          inline: "center"
        });
      }
    }, 50);

    // =======================
    // 📆 KALENDER
    // =======================
    function toggleKalender() {
      kalender.style.display =
        kalender.style.display === "block" ? "none" : "block";
    }

    function buildCalendar() {

      for (let y = 2026; y <= 2030; y++) {
        for (let m = 0; m < 12; m++) {

          const month = document.createElement("div");
          month.classList.add("monat");

          const title = document.createElement("h2");
          const d = new Date(y, m);

          title.innerText = d.toLocaleString("de-DE", {
            month: "long",
            year: "numeric"
          });

          month.appendChild(title);

          const grid = document.createElement("div");
          grid.classList.add("tageGrid");

          let first = new Date(y, m, 1).getDay();
          first = first === 0 ? 6 : first - 1;

          for (let i = 0; i < first; i++) {
            grid.appendChild(document.createElement("div"));
          }

          const days = new Date(y, m + 1, 0).getDate();

          for (let day = 1; day <= days; day++) {

            const el = document.createElement("div");
            el.classList.add("tag");
            el.innerText = day;

            const key = new Date(y, m, day).toDateString();

            if (key === todayKey) el.classList.add("heute");
            if (trainingstage.includes(key)) el.classList.add("erledigt");
            if (new Date(y, m, day) < today && !trainingstage.includes(key)) {
              el.classList.add("verpasst");
            }

            el.onclick = () => {
              if (!trainingstage.includes(key)) {
                trainingstage.push(key);
                save();
                location.reload();
              }
            };

            grid.appendChild(el);
          }

          month.appendChild(grid);
          kalender.appendChild(month);
        }
      }
    }

    buildCalendar();

  </script>

</body>

</html>
